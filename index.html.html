  // ================= ADMIN: 예정일정 업로드 (엑셀 일괄 반영) =================
  const SCHED_HEADER_MAP = {
    poNumber:['발주번호','외주발주번호'], itemCode:['품번','외주품번호'], warehouse:['창고','입고창고','납품창고'], workOrderNo:['작업지시번호'],
    manufactureDate:['제조일'], packagingDate:['충포장일'], vendorDueDate:['입고예정일'], vendorDueDateEnd:['종료일','입고예정종료일'], scheduleQty:['예정수량','수량'],
    scheduleStatus:['일정구분','일정상태'], materialReady:['자재완료','자재완료여부','자재상태'], materialNote:['자재메모','부족자재','자재비고','자재수급일정']
  };
  function findScheduleHeaderRow(rows){
    for(let i=0;i<Math.min(rows.length,12);i++){
      const row=(rows[i]||[]).map(h=>String(h||'').trim());
      const hasPo = row.some(h=>h.indexOf('발주번호')!==-1);
      const hasCode = row.some(h=>h.indexOf('품번')!==-1);
      const hasDue = row.some(h=>h.indexOf('입고예정일')!==-1);
      if(hasPo && hasCode && hasDue) return i;
    }
    return -1;
  }
  function normalizeScheduleStatus(v){
    const s = String(v||'').trim();
    if(!s) return null;
    if(s.indexOf('확정')!==-1) return 'confirmed';
    if(s.indexOf('예상')!==-1) return 'estimated';
    return null;
  }
  function normalizeMaterialReady(v){
    const s = String(v||'').trim().toUpperCase();
    if(!s) return null;
    if(['Y','완료','자재완료','TRUE','1','O'].includes(s)) return true;
    if(['N','미완료','부족','자재부족','FALSE','0','X'].includes(s)) return false;
    return null;
  }
  function parseScheduleWorkbook(wb){
    const found = findSheetAndHeaderRow(wb, findScheduleHeaderRow);
    if(!found) throw new Error('헤더 행을 찾을 수 없습니다. "발주번호", "품번", "입고예정일" 문구가 포함된 컬럼이 있는 시트인지 확인해 주세요.');
    const { rows, headerIdx } = found;
    const header = rows[headerIdx]; const col = {};
    for(const key in SCHED_HEADER_MAP){ const idx = findColIndex(header, SCHED_HEADER_MAP[key]); if(idx!==-1) col[key]=idx; }
    const required = ['poNumber','itemCode'];
    const missing = required.filter(r=>col[r]===undefined);
    if(missing.length) throw new Error('필수 컬럼을 찾을 수 없습니다: '+missing.join(', '));
    const records = [];
    for(let i=headerIdx+1;i<rows.length;i++){
      const row = rows[i];
      if(!row || row.every(v=>v===''||v===undefined||v===null)) continue;
      const poNumber = String(row[col.poNumber]||'').trim();
      const itemCode = String(row[col.itemCode]||'').trim();
      if(!poNumber || !itemCode) continue;
      records.push({
        poNumber, itemCode,
        warehouse: col.warehouse!==undefined?String(row[col.warehouse]||'').trim():'',
        workOrderNo: col.workOrderNo!==undefined?String(row[col.workOrderNo]||'').trim():'',
        manufactureDate: col.manufactureDate!==undefined?String(row[col.manufactureDate]||'').trim():'',
        packagingDate: col.packagingDate!==undefined?String(row[col.packagingDate]||'').trim():'',
        vendorDueDate: col.vendorDueDate!==undefined?String(row[col.vendorDueDate]||'').trim():'',
        vendorDueDateEnd: col.vendorDueDateEnd!==undefined?String(row[col.vendorDueDateEnd]||'').trim():'',
        scheduleQty: col.scheduleQty!==undefined && row[col.scheduleQty]!=='' ? parseNum(row[col.scheduleQty]) : null,
        scheduleStatus: col.scheduleStatus!==undefined?normalizeScheduleStatus(row[col.scheduleStatus]):null,
        materialReady: col.materialReady!==undefined?normalizeMaterialReady(row[col.materialReady]):null,
        materialNote: col.materialNote!==undefined?String(row[col.materialNote]||'').trim():''
      });
    }
    return records;
  }
  function applyScheduleRecords(records, opts){
    opts = opts || {};
    const vendorScope = opts.vendorScope || null; // 지정 시 해당 거래처 소유 발주만 매칭(거래처 본인 업로드용 보안 제한)
    const actorLabel = opts.actorLabel || '관리자(엑셀업로드)';
    const isVendorActor = !!opts.isVendorActor;
    let matched=0, unmatched=0, rowsWithNoTarget=[];
    records.forEach(rec=>{
      const candidates = DB.items.filter(it=>
        it.poNumber===rec.poNumber && it.itemCode===rec.itemCode &&
        (!vendorScope || it.vendor===vendorScope) &&
        (!rec.warehouse || it.warehouse===rec.warehouse) &&
        (!rec.workOrderNo || it.workOrderNo===rec.workOrderNo)
      );
      if(candidates.length===0){ unmatched++; rowsWithNoTarget.push(rec.poNumber+'/'+rec.itemCode); return; }
      candidates.forEach(it=>{
        if(!rec.vendorDueDate){
          if(rec.materialReady !== null) it.materialReady = rec.materialReady;
          if(rec.materialNote) it.materialNote = rec.materialNote;
          matched++; return;
        }
        seedBatchesForEdit(it);
        let batch = it.scheduleBatches.find(b=>b.vendorDueDate===rec.vendorDueDate);
        const qty = rec.scheduleQty!=null ? rec.scheduleQty : (batch ? batch.qty : Math.max(0, it.pendingQty - batchQtySum(it)));
        if(batch){
          const changed = (rec.manufactureDate && batch.manufactureDate!==rec.manufactureDate) || (rec.packagingDate && batch.packagingDate!==rec.packagingDate) || (rec.scheduleQty!=null && Number(batch.qty)!==rec.scheduleQty);
          if(changed){
            it.scheduleHistory = it.scheduleHistory || [];
            it.scheduleHistory.push({changedAt:new Date().toISOString(), changedBy:actorLabel, before:{manufactureDate:batch.manufactureDate, packagingDate:batch.packagingDate, vendorDueDate:batch.vendorDueDate, qty:batch.qty}, after:{manufactureDate:rec.manufactureDate||batch.manufactureDate, packagingDate:rec.packagingDate||batch.packagingDate, vendorDueDate:rec.vendorDueDate, qty}});
            if(isVendorActor) it.scheduleAcked = false;
          }
          if(rec.manufactureDate) batch.manufactureDate = rec.manufactureDate;
          if(rec.packagingDate) batch.packagingDate = rec.packagingDate;
          if(rec.vendorDueDateEnd) batch.endDate = rec.vendorDueDateEnd;
          batch.qty = qty;
          batch.source = isVendorActor ? 'vendor' : 'admin';
          if(isVendorActor) batch.scheduleStatus = 'confirmed';
          else if(rec.scheduleStatus) batch.scheduleStatus = rec.scheduleStatus;
        } else {
          it.scheduleBatches.push({ id:'b_'+uid(), manufactureDate:rec.manufactureDate||'', packagingDate:rec.packagingDate||'', vendorDueDate:rec.vendorDueDate, endDate:rec.vendorDueDateEnd||'', qty, scheduleStatus: isVendorActor?'confirmed':(rec.scheduleStatus||'estimated'), source: isVendorActor?'vendor':'admin', createdAt:new Date().toISOString() });
          it.firstVendorDueDate = it.firstVendorDueDate || rec.vendorDueDate;
        }
        syncPrimaryScheduleFromBatches(it);
        if(rec.materialReady !== null) it.materialReady = rec.materialReady;
        if(rec.materialNote) it.materialNote = rec.materialNote;
        it.scheduleUpdatedAt = new Date().toISOString();
        matched++;
      });
    });
    return { matched, unmatched, rowsWithNoTarget };
  }

  async function bulkDownload(receipts){
    const withImg = receipts.filter(r=>r.imageAttached && r.imageKey);
    if(withImg.length===0){ toast('다운로드할 명세서가 없습니다.', true); return; }
    toast('명세서 압축 파일을 준비 중입니다...');
    const zip = new JSZip(); let n=0;
    for(const r of withImg){
      const dataUrl = await getImage(r.imageKey); if(!dataUrl) continue;
      const base64 = dataUrl.split(',')[1];
      const fname = `${r.vendor}_${r.itemCode}_${r.receiptDate}.jpg`.replace(/[\\/:*?"<>|]/g,'_');
      zip.file(fname, base64, {base64:true}); n++;
    }
    if(n===0){ toast('이미지 데이터를 불러오지 못했습니다.', true); return; }
    const blob = await zip.generateAsync({type:'blob'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`명세서_${session.vendorName}_${todayStr()}.zip`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    toast(`${n}건의 명세서를 다운로드했습니다.`);
  }

  function buildMonthlyReportRows(month){
    const items = DB.items.filter(it=>monthKey(it.dueDate)===month);
    const map = {};
    items.forEach(it=>{
      map[it.vendor] = map[it.vendor] || {vendor:it.vendor, itemCount:0, order:0, received:0, pending:0};
      map[it.vendor].itemCount++;
      map[it.vendor].order += it.orderQty;
      map[it.vendor].received += it.receivedQty;
      map[it.vendor].pending += effPending(it);
    });
    const rows = Object.values(map).sort((a,b)=>b.pending-a.pending);
    const totals = rows.reduce((s,r)=>({order:s.order+r.order, received:s.received+r.received, pending:s.pending+r.pending, itemCount:s.itemCount+r.itemCount}), {order:0, received:0, pending:0, itemCount:0});
    return { rows, totals, overdue: items.filter(it=>!it.terminated && it.pendingQty>0 && it.vendorDueDate && it.vendorDueDate < todayStr()) };
  }
  function buildWeeklyReportData(){
    const today = new Date(); const todayS = todayStr();
    const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate()-6);
    const weekAgoS = weekAgo.toISOString().slice(0,10);
    const newOrders = DB.items.filter(it=>it.poDate && it.poDate>=weekAgoS && it.poDate<=todayS);
    const newReceipts = DB.receipts.filter(r=>r.receiptDate && r.receiptDate>=weekAgoS && r.receiptDate<=todayS);
    const normalReceipts = newReceipts.filter(r=>Number(r.qty)>=0);
    const returnReceipts = newReceipts.filter(r=>Number(r.qty)<0);
    const overdueNow = DB.items.filter(it=>!it.terminated && it.pendingQty>0 && it.vendorDueDate && it.vendorDueDate<todayS);
    const unackedChanges = DB.items.filter(it=>it.scheduleAcked===false);
    const vendorPendingMap = {};
    DB.items.forEach(it=>{ const p = effPending(it); if(p>0) vendorPendingMap[it.vendor]=(vendorPendingMap[it.vendor]||0)+p; });
    const topPending = Object.entries(vendorPendingMap).map(([vendor,qty])=>({vendor,qty})).sort((a,b)=>b.qty-a.qty).slice(0,5);
    return {
      periodLabel: weekAgoS+' ~ '+todayS,
      newOrderCount: newOrders.length, newOrderQty: newOrders.reduce((s,it)=>s+it.orderQty,0),
      newReceiptCount: normalReceipts.length, newReceiptQty: normalReceipts.reduce((s,r)=>s+r.qty,0),
      returnCount: returnReceipts.length, returnQty: returnReceipts.reduce((s,r)=>s+Math.abs(r.qty),0),
      overdueCount: overdueNow.length, unackedCount: unackedChanges.length, topPending
    };
  }

  // ================= 공통: 입고예정 캘린더 (관리자/영업채널/거래처) =================
  function calendarEventsRaw(items, useRelevant){
    // 등록된 입고예정일(거래처가 입력한 원 날짜, 기간이면 종료일) 기준
    const map = {};
    items.forEach(it=>{
      const batches = useRelevant ? relevantBatches(it) : getScheduleBatches(it);
      batches.forEach(b=>{
        const d = batchEffectiveDate(b);
        if(!d) return;
        map[d] = map[d] || [];
        map[d].push({ vendor: it.vendor, poNumber: it.poNumber, itemCode: it.itemCode, itemName: it.itemName, qty: b.qty });
      });
    });
    return map;
  }
  function calendarEventsSales(items){
    // 영업팀 표시일(D+5 영업일) 기준
    const map = {};
    items.forEach(it=>{
      getScheduleBatches(it).forEach(b=>{
        const base = batchEffectiveDate(b);
        if(!base) return;
        const d = addBizDays(base, 5);
        map[d] = map[d] || [];
        map[d].push({ vendor: it.vendor, poNumber: it.poNumber, itemCode: it.itemCode, itemName: it.itemName, qty: b.qty });
      });
    });
    return map;
  }

  // ================= VENDOR: 예정일정등록 (제조일/충포장일/입고예정일) =================
  async function upsertPrimaryOrOnlyBatch(it, vals){
    const { manu, pack, due, qty, matReady, matNote } = vals;
    // 자재상태는 일정 등록 여부와 무관하게 항상 저장됩니다.
    it.materialReady = matReady; it.materialNote = matNote;
    if(!due){
      await saveItems();
      return { ok:true, changedByVendor:false, materialOnly:true };
    }
    if(!qty || qty<=0){ return {ok:false, msg:'수량을 입력해 주세요.'}; }
    seedBatchesForEdit(it);
    // 거래처 화면에서는 거래처 본인이 등록한 배치만 수정 대상으로 삼습니다(관리자가 등록한 배치는 건드리지 않음).
    const myBatches = it.scheduleBatches.filter(b=>b.source==='vendor');
    const existing = myBatches[0];
    let changed = false;
    if(existing){
      changed = (existing.vendorDueDate!==due || existing.manufactureDate!==manu || existing.packagingDate!==pack || Number(existing.qty)!==Number(qty));
      if(changed){
        it.scheduleHistory = it.scheduleHistory || [];
        it.scheduleHistory.push({changedAt:new Date().toISOString(), changedBy: session.role==='admin'?actorLabel():'거래처', before:{manufactureDate:existing.manufactureDate, packagingDate:existing.packagingDate, vendorDueDate:existing.vendorDueDate, qty:existing.qty}, after:{manufactureDate:manu, packagingDate:pack, vendorDueDate:due, qty}});
        if(session.role!=='admin') it.scheduleAcked = false;
      }
      existing.manufactureDate=manu; existing.packagingDate=pack; existing.vendorDueDate=due; existing.qty=qty;
      if(session.role==='vendor') existing.scheduleStatus='confirmed';
    } else {
      it.scheduleBatches.push({ id:'b_'+uid(), manufactureDate:manu, packagingDate:pack, vendorDueDate:due, qty, scheduleStatus: session.role==='vendor'?'confirmed':'estimated', source: session.role==='admin'?'admin':'vendor', createdAt:new Date().toISOString() });
      it.firstVendorDueDate = it.firstVendorDueDate || due;
      changed = true;
    }
    syncPrimaryScheduleFromBatches(it);
    it.scheduleUpdatedAt = new Date().toISOString();
    await saveItems();
    return { ok:true, changedByVendor: changed && session.role!=='admin' };
  }

          <div class="row"><span>발주번호</span><span class="mono">${esc(it.poNumber)}</span></div>
          <div class="row"><span>품번</span><span class="mono">${esc(it.itemCode)}${!itemMasterOf(it.itemCode)?' (마스터 미등록)':''}</span></div>
          <div class="row"><span>발주일 / 납품예정일</span><span class="mono">${esc(it.poDate)} / ${esc(it.dueDate)}</span></div>
          <div class="row"><span>발주/입고/미입고</span><span class="mono">${fmtNum(it.orderQty)} / ${fmtNum(it.receivedQty)} / ${fmtNum(it.pendingQty)}</span></div>
          <div class="row"><span>제조일 / 충포장일 / 입고예정일</span><span class="mono">${esc(it.manufactureDate||'-')} / ${esc(it.packagingDate||'-')} / ${esc(it.vendorDueDate||'-')}</span></div>
          <div class="row"><span>영업팀 표시일</span><span class="mono">${esc(salesDueDate(it)||'-')}</span></div>
          <div class="row"><span>일정구분</span><span>${scheduleConfirmPill(it)}</span></div>
          <div class="row"><span>자재상태</span><span>${materialPill(it)}</span></div>
          <div class="row"><span>상태</span><span>${statusPill(it)}</span></div>
        </div>
        ${it.materialNote ? `<div class="section-note" style="margin-bottom:14px;">자재 메모: ${esc(it.materialNote)}</div>` : ''}
        ${session.role==='admin' ? `<div style="margin-bottom:14px; display:flex; gap:8px;"><button class="btn small" id="edit-order-btn">✏ 발주 내용 수정</button><button class="btn small" id="edit-sched-btn">📅 ${it.vendorDueDate?'예정일정 수정':'예정일정 등록'}</button></div>` : ''}
        ${it.terminated ? `<div class="section-note crit" style="display:flex; justify-content:space-between; align-items:center; gap:10px;"><span>중단 처리됨${it.terminatedReason?' · 사유: '+esc(it.terminatedReason):''}</span>${session.role==='admin'?'<button class="btn small" id="reopen-btn">중단 취소</button>':''}</div>`
          : (session.role==='admin' && it.pendingQty>0 ? `<div style="margin-bottom:14px;"><button class="btn danger small" id="terminate-btn">⛔ 남은 수량 강제 종료(중단처리)</button></div>` : '')}
        <h3 style="font-size:13px;">등록된 예정일정 (${relevantBatches(it).length}건)</h3>
        <div class="list-mini" style="margin-bottom:14px;">
          ${relevantBatches(it).length===0?'<div class="row"><span style="color:var(--muted);">등록된 일정이 없습니다.</span></div>':
          relevantBatches(it).map((b,i)=>`<div class="row"><span>#${i+1} 입고예정 ${esc(batchDateLabel(b))} · 수량 ${fmtNum(b.qty)}</span><span>${b.scheduleStatus==='confirmed'?'확정':'예상'}</span></div>`).join('')}
        </div>
        <h3 style="font-size:13px;">관련 입고 원장 (${relatedReceipts.length})</h3>
        <div class="list-mini">
          ${relatedReceipts.length===0?'<div class="row"><span style="color:var(--muted);">등록된 입고 내역이 없습니다.</span></div>':
          relatedReceipts.map(r=>`<div class="row"><span>${esc(r.receiptDate)} · ${fmtNum(r.qty)} · ${esc(r.warehouse)}</span><span>${r.imageAttached?`<button class="btn small" data-view-r2="${r.id}">명세서</button>`:'미첨부'}</span></div>`).join('')}
        </div>
      </div></div></div>`;
    document.getElementById('m-close').onclick=()=>root.innerHTML='';
    const editBtn = document.getElementById('edit-order-btn'); if(editBtn) editBtn.onclick=()=>openEditOrderModal(it.id);
    const editSchedBtn = document.getElementById('edit-sched-btn'); if(editSchedBtn) editSchedBtn.onclick=()=>openScheduleModal(it.id);
    const termBtn = document.getElementById('terminate-btn'); if(termBtn) termBtn.onclick=()=>openTerminateModal(it.id);
    const reopenBtn = document.getElementById('reopen-btn'); if(reopenBtn) reopenBtn.onclick=()=>reopenItem(it.id);
    root.querySelectorAll('[data-view-r2]').forEach(b=>{ b.onclick=()=>openReceiptImageModalRaw(b.getAttribute('data-view-r2')); });
  }

  // ---------- export helpers ----------
  function exportExcel(rows, filename, alreadyPlain){
    const data = alreadyPlain ? rows : rows;
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    XLSX.writeFile(wb, filename+'_'+todayStr()+'.xlsx');
  }
  function exportPrintRows(rows, title){
    if(rows.length===0){ toast('내보낼 데이터가 없습니다.', true); return; }
    const cols = Object.keys(rows[0]);
    const head = cols.map(c=>`<th>${esc(c)}</th>`).join('');
    const body = rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c])}</td>`).join('')}</tr>`).join('');
    const html = `<h2>${esc(title)}</h2><div style="font-size:11px;color:#666;margin-bottom:10px;">출력일: ${todayStr()}</div><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    const printRoot = document.getElementById('oem-print-root');
    printRoot.innerHTML = html;
    window.print();
  }

  // ---------- init ----------
  async function init(){
    app.innerHTML = `<div class="badge-screen"><div style="color:#8B99AF; font-family:var(--mono); font-size:13px;">시스템을 불러오는 중입니다...</div></div>`;
    await loadAll();
    const params = new URLSearchParams(window.location.search);
    const urlToken = params.get('token');
    if(urlToken && tryLogin(urlToken)){ render(); } else { renderLogin(); }
  }
  init();
})();
</script>
