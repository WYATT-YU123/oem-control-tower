<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root{
  --ink:#0F1826; --ink-2:#182437; --paper:#F3F5F7; --surface:#FFFFFF;
  --line:#E1E5EA; --line-strong:#C7CDD6; --text:#151E2B; --muted:#6B7684;
  --brand:#00A79D; --brand-dark:#00857D; --amber:#E2992F; --amber-bg:#FCF2DE;
  --green:#2E9E6C; --green-bg:#E4F5EC; --red:#D5493F; --red-bg:#FBE7E5;
  --blue-badge:#3A6FF7; --purple:#7C5CFC; --purple-bg:#EFEAFF; --gold-badge:#C48A1B;
  --radius:10px; --mono:'IBM Plex Mono', ui-monospace, monospace;
  --sans:'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
}
*{box-sizing:border-box;}
#oem-app, #oem-app *{font-family:var(--sans);}
#oem-app{color:var(--text); background:var(--paper); min-height:640px; border-radius:14px; overflow:hidden; border:1px solid var(--line); font-size:14px; line-height:1.5;}
#oem-app .mono{font-family:var(--mono);}

.badge-screen{min-height:640px; display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at 20% 20%, rgba(0,167,157,0.16), transparent 45%),
             radial-gradient(circle at 80% 80%, rgba(124,92,252,0.14), transparent 45%), var(--ink);
  padding:40px 20px;}
.badge-card{width:100%; max-width:390px; background:var(--ink-2); border:1px solid #2A3A54; border-radius:16px;
  padding:28px 26px 26px; box-shadow:0 20px 60px rgba(0,0,0,0.35); position:relative; overflow:hidden;}
.badge-card::before{content:''; position:absolute; left:0; right:0; top:0; height:4px; background:linear-gradient(90deg, var(--brand), var(--purple));}
.badge-eyebrow{color:var(--brand); font-family:var(--mono); font-size:11px; letter-spacing:0.16em; text-transform:uppercase; margin-bottom:6px;}
.badge-title{color:#fff; font-size:20px; font-weight:700; margin-bottom:2px;}
.badge-sub{color:#8B99AF; font-size:12.5px; margin-bottom:22px;}
.scan-slot{border:1.5px dashed #33465F; border-radius:12px; padding:16px; margin-bottom:16px; position:relative; overflow:hidden;}
.scan-slot.scanning::after{content:''; position:absolute; left:0; right:0; height:2px; background:var(--brand); box-shadow:0 0 12px 2px var(--brand); animation:scanline .9s ease-in-out;}
@keyframes scanline{0%{top:0;opacity:1;}100%{top:100%;opacity:.2;}}
.badge-input-label{color:#8B99AF; font-size:11.5px; font-family:var(--mono); letter-spacing:.06em; margin-bottom:8px; display:block;}
.badge-input{width:100%; background:#0E1826; border:1px solid #2A3A54; color:#fff; font-family:var(--mono); font-size:15px; letter-spacing:.05em; padding:11px 12px; border-radius:8px; outline:none;}
.badge-input:focus{border-color:var(--brand);}
.badge-btn{width:100%; margin-top:14px; background:var(--brand); color:#04211E; font-weight:700; font-size:14px; border:none; border-radius:8px; padding:12px; cursor:pointer;}
.badge-btn:hover{background:#00BFB3;}
.badge-btn:active{transform:scale(.98);}
.badge-error{color:var(--red); background:rgba(213,73,63,.12); border:1px solid rgba(213,73,63,.35); padding:8px 10px; border-radius:8px; font-size:12.5px; margin-top:10px;}
.notice-line{font-size:11.5px; color:#5D6B84; margin-top:10px; line-height:1.5;}
.badge-quicklist{display:flex; gap:6px; flex-wrap:wrap; margin-top:12px;}
.badge-quicklist span{font-family:var(--mono); font-size:10.5px; color:#66748C; border:1px solid #2A3A54; padding:3px 7px; border-radius:5px;}

.shell{display:flex; min-height:640px;}
.sidebar{width:236px; flex-shrink:0; background:var(--ink); color:#fff; padding:18px 14px; display:flex; flex-direction:column;}
.id-card{background:var(--ink-2); border:1px solid #2A3A54; border-radius:10px; padding:12px; margin-bottom:18px;}
.id-clear{display:inline-block; font-family:var(--mono); font-size:10px; letter-spacing:.08em; font-weight:600; padding:2px 7px; border-radius:4px; margin-bottom:8px;}
.id-clear.admin{background:rgba(196,138,27,.18); color:var(--gold-badge); border:1px solid rgba(196,138,27,.4);}
.id-clear.vendor{background:rgba(58,111,247,.18); color:#89A7FF; border:1px solid rgba(58,111,247,.4);}
.id-clear.sales{background:rgba(124,92,252,.18); color:#BBA8FF; border:1px solid rgba(124,92,252,.4);}
.id-name{color:#fff; font-weight:700; font-size:14px; margin-bottom:2px; word-break:break-all;}
.id-token{color:#5D6B84; font-family:var(--mono); font-size:10.5px;}
.nav-item{display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:8px; margin-bottom:3px; color:#9AA7BC; font-size:13px; cursor:pointer; font-weight:500; border:1px solid transparent;}
.nav-item:hover{background:#1D2A3F;}
.nav-item.active{background:rgba(0,167,157,.14); color:#fff; border-color:rgba(0,167,157,.35);}
.nav-dot{width:6px; height:6px; border-radius:50%; background:#48566C; flex-shrink:0;}
.nav-item.active .nav-dot{background:var(--brand);}
.nav-group-label{font-family:var(--mono); font-size:10px; letter-spacing:.08em; color:#4A5875; padding:10px 10px 4px;}
.sidebar-foot{margin-top:auto; padding-top:14px; border-top:1px solid #22314A;}
.logout-btn{width:100%; background:transparent; border:1px solid #2A3A54; color:#8B99AF; padding:9px; border-radius:8px; font-size:12.5px; cursor:pointer;}
.logout-btn:hover{border-color:var(--red); color:var(--red);}

.main{flex:1; min-width:0; background:var(--paper); display:flex; flex-direction:column;}
.topbar{padding:16px 24px; background:var(--surface); border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;}
.topbar h1{font-size:17px; margin:0; font-weight:700;}
.topbar .sub{color:var(--muted); font-size:12px; margin-top:2px;}
.content{padding:22px 24px; overflow-y:auto;}

.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:16px;}
.card h2{font-size:14px; margin:0 0 12px; font-weight:700; display:flex; align-items:center; gap:8px;}
.card h2 .eyebrow{font-family:var(--mono); font-size:10.5px; color:var(--brand); letter-spacing:.08em; font-weight:600;}

.kpi-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:16px;}
.kpi{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px;}
.kpi .label{font-size:11.5px; color:var(--muted); margin-bottom:6px;}
.kpi .val{font-family:var(--mono); font-size:22px; font-weight:700;}
.kpi .val.amber{color:var(--amber);} .kpi .val.green{color:var(--green);} .kpi .val.brand{color:var(--brand-dark);} .kpi .val.red{color:var(--red);} .kpi .val.purple{color:var(--purple);}

.filter-bar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; align-items:center;}
.filter-bar select, .filter-bar input[type=text], .filter-bar input[type=month]{border:1px solid var(--line-strong); border-radius:7px; padding:7px 10px; font-size:12.5px; background:var(--surface); color:var(--text);}
.filter-bar input[type=text]{min-width:180px;}
.btn{border:1px solid var(--line-strong); background:var(--surface); color:var(--text); padding:7px 13px; border-radius:7px; font-size:12.5px; cursor:pointer; font-weight:600;}
.btn:hover{border-color:var(--brand); color:var(--brand-dark);}
.btn.primary{background:var(--brand); border-color:var(--brand); color:#04211E;}
.btn.primary:hover{background:#00BFB3;}
.btn.ghost{border-color:transparent; background:transparent; color:var(--muted);}
.btn.small{padding:4px 9px; font-size:11.5px;}
.btn.danger{color:var(--red); border-color:rgba(213,73,63,.4);}
.btn:disabled{opacity:.45; cursor:not-allowed;}

table{width:100%; border-collapse:collapse; font-size:12.5px;}
th{text-align:left; font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:8px 10px; border-bottom:2px solid var(--line); white-space:nowrap;}
td{padding:9px 10px; border-bottom:1px solid var(--line); vertical-align:middle;}
tr:hover td{background:#FAFBFC;}
.mono-cell{font-family:var(--mono); font-size:12px;}
.table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:var(--radius);}
.table-wrap table{border:none;}

.badge-pill{display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700; font-family:var(--mono);}
.pill-progress{background:var(--amber-bg); color:var(--amber);}
.pill-done{background:var(--green-bg); color:var(--green);}
.pill-partial{background:#E7EEFB; color:var(--blue-badge);}
.pill-stop{background:var(--red-bg); color:var(--red);}
.pill-noschedule{background:#F0F0F2; color:var(--muted);}

.progress-bar{width:100px; height:7px; background:var(--line); border-radius:99px; overflow:hidden;}
.progress-bar .fill{height:100%; background:linear-gradient(90deg, var(--brand), var(--brand-dark));}

.empty-state{text-align:center; padding:40px 20px; color:var(--muted);}
.empty-state .icon{font-size:28px; margin-bottom:8px;}

.modal-backdrop{position:absolute; inset:0; background:rgba(15,24,38,.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
.modal{background:var(--surface); border-radius:12px; width:100%; max-width:560px; max-height:88%; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,.3);}
.modal-head{padding:16px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
.modal-head h3{margin:0; font-size:15px; font-weight:700;}
.modal-body{padding:18px 20px;}
.modal-close{background:none; border:none; font-size:18px; cursor:pointer; color:var(--muted);}

.field{margin-bottom:13px;}
.field label{display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--text);}
.field .req{color:var(--red); margin-left:2px;}
.field input, .field select, .field textarea{width:100%; border:1px solid var(--line-strong); border-radius:7px; padding:8px 10px; font-size:13px; background:var(--surface); color:var(--text); font-family:var(--sans);}
.field textarea{resize:vertical; min-height:56px;}
.field .hint{font-size:11px; color:var(--muted); margin-top:4px;}
.field-row{display:flex; gap:10px;}
.field-row .field{flex:1;}

.toast{position:absolute; bottom:18px; right:18px; background:var(--ink-2); color:#fff; padding:11px 16px; border-radius:9px; font-size:12.5px; z-index:80; box-shadow:0 10px 26px rgba(0,0,0,.25); border-left:3px solid var(--brand);}
.toast.err{border-left-color:var(--red);}

.tag-chip{display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:2px 8px; border-radius:6px; font-family:var(--mono); font-weight:600;}
.chip-attached{background:var(--green-bg); color:var(--green);}
.chip-missing{background:#F0F0F2; color:var(--muted);}
.chip-alert{background:var(--red-bg); color:var(--red);}

.section-note{font-size:11.5px; color:var(--muted); background:#EFF3F1; border:1px solid var(--line); border-radius:8px; padding:9px 12px; margin-bottom:14px; line-height:1.6;}
.section-note.warn{background:var(--amber-bg); border-color:rgba(226,153,47,.4); color:#8A5E10;}
.section-note.crit{background:var(--red-bg); border-color:rgba(213,73,63,.4); color:var(--red);}

.thumb{width:100%; max-height:340px; object-fit:contain; border-radius:8px; border:1px solid var(--line); background:#F7F8F9;}

.list-mini{border:1px solid var(--line); border-radius:8px; overflow:hidden;}
.list-mini .row{display:flex; justify-content:space-between; padding:8px 10px; font-size:12px; border-bottom:1px solid var(--line); gap:10px;}
.list-mini .row:last-child{border-bottom:none;}
.list-mini .row:nth-child(even){background:#FAFBFC;}

.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.bar-label{width:120px; flex-shrink:0; font-size:11.5px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.bar-track{flex:1; height:16px; background:var(--paper); border-radius:5px; overflow:hidden; border:1px solid var(--line); position:relative;}
.bar-fill{height:100%; background:linear-gradient(90deg, var(--brand), var(--brand-dark));}
.bar-fill.b2{background:linear-gradient(90deg, var(--purple), #5C3FE0);}
.bar-val{width:90px; flex-shrink:0; text-align:right; font-family:var(--mono); font-size:11.5px; color:var(--muted);}

.dash-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media (max-width:900px){.dash-grid{grid-template-columns:1fr;}}

.cal-table{width:100%; border-collapse:collapse; table-layout:fixed;}
.cal-table th{text-align:center; font-size:12px; padding:8px 4px; border:1px solid var(--line); background:var(--paper); color:var(--muted);}
.cal-cell{border:1px solid var(--line); vertical-align:top; height:96px; padding:5px; width:14.28%; background:var(--surface);}
.cal-cell.cal-empty{background:#FAFBFC;}
.cal-cell.cal-today{background:var(--green-bg); border-color:var(--brand);}
.cal-daynum{font-family:var(--mono); font-size:12px; font-weight:700; margin-bottom:3px;}
.cal-total{font-size:10px; color:var(--brand-dark); font-weight:700; margin-bottom:3px;}
.cal-chip{font-size:10px; background:var(--paper); border:1px solid var(--line); border-radius:4px; padding:1px 4px; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.cal-cell.cal-clickable{cursor:pointer;}
.cal-cell.cal-clickable:hover{background:#F0F7F6; box-shadow:inset 0 0 0 1px var(--brand);}
.cal-more{font-size:10px; color:var(--brand-dark); font-weight:700; text-decoration:underline;}
#oem-print-root{display:none;}
@media print{
  #oem-app > *:not(#oem-print-root){display:none !important;}
  #oem-print-root{display:block !important; padding:20px; background:#fff;}
  #oem-print-root table{width:100%; border-collapse:collapse; font-size:11px;}
  #oem-print-root th, #oem-print-root td{border:1px solid #999; padding:5px 7px;}
}
</style>

<div id="oem-app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script>
(function(){
  const ADMIN_PASSCODE = 'ADMIN2026';
  const SALES_PASSCODE = 'WYATT2026';
  // 2026년 한국 공휴일(대체공휴일 포함) 참고용 목록 — 실제 확정일과 다를 수 있어 필요 시 수정하세요.
  const KR_HOLIDAYS = new Set([
    '2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-03-01','2026-03-02',
    '2026-05-05','2026-05-24','2026-05-25','2026-06-06',
    '2026-08-15','2026-08-17','2026-09-24','2026-09-25','2026-09-26',
    '2026-10-03','2026-10-05','2026-10-09','2026-12-25'
  ]);

  let DB = { vendors:[], itemMaster:[], items:[], receipts:[] };
  let session = null; // {role:'admin'|'vendor'|'sales', vendorName, token}
  let currentTab = null;
  let filters = { vendor:'전체', status:'전체', month:'전체', channel:'전체', q:'' };
  let scheduleFilterMode = '등록됨'; // '등록됨' | '전체' | '미등록'
  let vendorChartInstances = [];
  let scheduleSelected = new Set();
  let tableSortState = { key: null, dir: 'asc' };
  let calendarMonth = null; // 'YYYY-MM', 초기값은 오늘 기준으로 첫 렌더 시 설정
  function shiftMonth(monthStr, delta){
    const [y,m] = monthStr.split('-').map(Number);
    const d = new Date(y, m-1+delta, 1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  }
  function buildCalendarHtml(monthStr, eventsByDate, opts){
    opts = opts || {};
    const [y,m] = monthStr.split('-').map(Number);
    const firstDay = new Date(y, m-1, 1);
    const startWeekday = firstDay.getDay(); // 0=일
    const daysInMonth = new Date(y, m, 0).getDate();
    const todayS = todayStr();
    const weekLabels = ['일','월','화','수','목','금','토'];

    function cellHtml(dateStr, d){
      if(d===null) return `<td class="cal-cell cal-empty"></td>`;
      const dow = new Date(dateStr+'T00:00:00').getDay();
      const events = eventsByDate[dateStr] || [];
      const totalQty = events.reduce((s,e)=>s+Number(e.qty||0),0);
      const isToday = dateStr===todayS;
      const shown = events.slice(0,3);
      const more = events.length - shown.length;
      return `<td class="cal-cell${isToday?' cal-today':''}${events.length?' cal-clickable':''}" ${events.length?`data-cal-date="${dateStr}"`:''}>
        <div class="cal-daynum" style="${dow===0?'color:var(--red);':dow===6?'color:var(--blue-badge);':''}">${d}</div>
        ${events.length ? `<div class="cal-total">${fmtNum(totalQty)}개 · ${events.length}건</div>` : ''}
        ${shown.map(e=>`<div class="cal-chip" title="${esc((opts.showVendor?e.vendor+' · ':'')+e.itemCode+' '+(e.itemName||'')+' · '+fmtNum(e.qty)+'개')}">${esc(opts.showVendor?e.vendor+' · '+e.itemCode:e.itemCode)} ${fmtNum(e.qty)}</div>`).join('')}
        ${more>0?`<div class="cal-more">+${more}건 더</div>`:''}
      </td>`;
    }

    // 날짜를 주 단위(7일)로 묶어서 tr을 정확히 생성
    const dayList = [];
    for(let i=0;i<startWeekday;i++) dayList.push({d:null});
    for(let d=1; d<=daysInMonth; d++){
      dayList.push({ d, dateStr: `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}` });
    }
    while(dayList.length % 7 !== 0) dayList.push({d:null});
    let rowsHtml = '';
    for(let i=0;i<dayList.length;i+=7){
      const week = dayList.slice(i,i+7);
      rowsHtml += '<tr>' + week.map(x=> x.d===null ? cellHtml(null,null) : cellHtml(x.dateStr, x.d)).join('') + '</tr>';
    }

    return `
      <div class="filter-bar" style="margin-bottom:14px;">
        <button class="btn small" id="cal-prev">◀ 이전달</button>
        <span style="font-weight:700; font-size:15px; min-width:90px; text-align:center;">${monthStr}</span>
        <button class="btn small" id="cal-next">다음달 ▶</button>
        <button class="btn small" id="cal-today">오늘</button>
      </div>
      <table class="cal-table"><thead><tr>${weekLabels.map((w,i)=>`<th style="${i===0?'color:var(--red);':i===6?'color:var(--blue-badge);':''}">${w}</th>`).join('')}</tr></thead>
      <tbody>${rowsHtml}</tbody></table>
    `;
  }
  function bindCalendarDayClicks(eventsByDate, opts){
    document.querySelectorAll('[data-cal-date]').forEach(td=>{
      td.onclick = ()=>{
        const dateStr = td.getAttribute('data-cal-date');
        openCalendarDayModal(dateStr, eventsByDate[dateStr]||[], opts||{});
      };
    });
  }
  function openCalendarDayModal(dateStr, events, opts){
    const root = document.getElementById('modal-root');
    const totalQty = events.reduce((s,e)=>s+Number(e.qty||0),0);
    root.innerHTML = `<div class="modal-backdrop"><div class="modal">
      <div class="modal-head"><h3>${esc(dateStr)} 입고예정 (${events.length}건)</h3><button class="modal-close" id="m-close">✕</button></div>
      <div class="modal-body">
        <div class="section-note">총 수량 ${fmtNum(totalQty)}개</div>
        <div class="list-mini">
          ${events.map(e=>`<div class="row"><span>${esc((opts.showVendor?e.vendor+' · ':'')+e.itemCode+(e.itemName?' '+e.itemName:'')+(e.poNumber?' ('+e.poNumber+')':''))}</span><span>${fmtNum(e.qty)}개</span></div>`).join('')}
        </div>
      </div></div></div>`;
    document.getElementById('m-close').onclick = ()=>root.innerHTML='';
  }
  function bindCalendarNav(rerenderFn){
    document.getElementById('cal-prev').onclick = ()=>{ calendarMonth = shiftMonth(calendarMonth, -1); rerenderFn(); };
    document.getElementById('cal-next').onclick = ()=>{ calendarMonth = shiftMonth(calendarMonth, 1); rerenderFn(); };
    document.getElementById('cal-today').onclick = ()=>{ calendarMonth = monthKey(todayStr()); rerenderFn(); };
  }
  function sortByKey(list, key, dir){
    if(!key) return list;
    const mul = dir==='asc' ? 1 : -1;
    const arr = list.slice();
    arr.sort((a,b)=>{
      let av, bv;
      if(key==='materialReady'){ av = a.materialReady?2:(a.materialNote?0:1); bv = b.materialReady?2:(b.materialNote?0:1); }
      else if(key==='scheduleStatus'){ av = a.vendorDueDate ? (a.scheduleStatus==='confirmed'?2:1) : 0; bv = b.vendorDueDate ? (b.scheduleStatus==='confirmed'?2:1) : 0; }
      else { av = a[key]; bv = b[key]; }
      const aEmpty = av===undefined||av===null||av==='';
      const bEmpty = bv===undefined||bv===null||bv==='';
      if(aEmpty && bEmpty) return 0;

      if(typeof av==='number' && typeof bv==='number') return (av-bv)*mul;
      return String(av).localeCompare(String(bv),'ko')*mul;
    });
    return arr;
  }

  function addBizDays(dateStr, n){
    if(!dateStr) return '';

    while(count < n){

      const ds = d.toISOString().slice(0,10);
      if(isBizDay(ds)) count++;

    return d.toISOString().slice(0,10);
  }

  function compressImage(file, maxW, quality){
    maxW = maxW||1400; quality = quality||0.72;
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = function(e){
        const img = new Image();
        img.onload = function(){
          let w=img.width, h=img.height;
          if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
          const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
          const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror=reject; img.src=e.target.result;
      };
      reader.onerror=reject; reader.readAsDataURL(file);
    });
  }

  // ---------- core business logic ----------
  function vendorMonthlyStats(vendor){
    const orderMap = {};
    DB.items.filter(it=>it.vendor===vendor).forEach(it=>{
      const mk = monthKey(it.dueDate);
      orderMap[mk] = orderMap[mk] || {order:0, pending:0};
      orderMap[mk].order += it.orderQty;
      orderMap[mk].pending += effPending(it);
    });
    const receiptQtyMap = {};
    DB.receipts.filter(r=>r.vendor===vendor).forEach(r=>{
      const mk = monthKey(r.receiptDate);
      receiptQtyMap[mk] = (receiptQtyMap[mk]||0) + Number(r.qty||0);
    });
    const manuTonMap = {};
    DB.receipts.filter(r=>r.vendor===vendor).forEach(r=>{
      const mk = monthKey(r.receiptDate);
      const masters = itemMasterAllOf(r.itemCode);
      masters.forEach(m=>{ manuTonMap[mk] = (manuTonMap[mk]||0) + tonsWithVolume(r.qty, m.requiredVolumeMl); });
    });
    const pendingTonMap = {};
    DB.items.filter(it=>it.vendor===vendor).forEach(it=>{
      const p = effPending(it); if(p<=0) return;
      const mk = monthKey(it.dueDate);
      const masters = itemMasterAllOf(it.itemCode);
      masters.forEach(m=>{ pendingTonMap[mk] = (pendingTonMap[mk]||0) + tonsWithVolume(p, m.requiredVolumeMl); });
    });
    const months = Array.from(new Set([...Object.keys(orderMap), ...Object.keys(receiptQtyMap), ...Object.keys(manuTonMap), ...Object.keys(pendingTonMap)])).filter(m=>m!=='미정').sort();
    return months.map(m=>{
      const o = orderMap[m] || {order:0, pending:0};
      const received = receiptQtyMap[m] || 0;
      return {
        month:m, order:o.order, received, pending:o.pending,
        manuTon: manuTonMap[m]||0, pendingTon: pendingTonMap[m]||0,
        rate: o.order>0 ? Math.round(received/o.order*1000)/10 : 0
      };
    });
  }

  function reallocateGroup(vendor, itemCode){
    const group = DB.items.filter(it=>it.vendor===vendor && it.itemCode===itemCode)
      .sort((a,b)=> (a.poDate||'').localeCompare(b.poDate||'') || String(a.poNumber).localeCompare(String(b.poNumber)));
    const totalReceipts = DB.receipts.filter(r=>r.vendor===vendor && r.itemCode===itemCode && !r.excludeFromAllocation).reduce((s,r)=>s+Number(r.qty||0),0);
    let remaining = totalReceipts;
    group.forEach(it=>{
      if(it.terminated){ remaining -= Number(it.receivedQty||0); return; }
      const alloc = Math.min(it.orderQty, Math.max(0, remaining));
      it.receivedQty = alloc;
      it.pendingQty = Math.max(0, it.orderQty - alloc);
      it.status = it.pendingQty<=0 ? '입고완료' : (it.receivedQty>0 ? '부분입고' : '진행중');
      it.updatedAt = new Date().toISOString();
      remaining -= alloc;
    });
  }
  function computeGroupOverflow(vendor, itemCode){
    const group = DB.items.filter(it=>it.vendor===vendor && it.itemCode===itemCode && !it.terminated);
    const totalOrder = group.reduce((s,it)=>s+Number(it.orderQty||0),0);
    const totalReceipts = DB.receipts.filter(r=>r.vendor===vendor && r.itemCode===itemCode && !r.excludeFromAllocation).reduce((s,r)=>s+Number(r.qty||0),0);
    return totalReceipts - totalOrder; // 양수면 초과분
  }

  // 한 발주건의 미입고수량이 여러 날짜로 나뉘어 들어오는 경우를 지원합니다.
  // it.scheduleBatches가 있으면 그 배열을 우선 사용하고, 없으면 기존 단일 필드를 배치 1건으로 간주합니다(하위호환).
  function getScheduleBatches(it){
    if(it.scheduleBatches && it.scheduleBatches.length>0){
      return it.scheduleBatches.slice().sort((a,b)=>(a.vendorDueDate||'').localeCompare(b.vendorDueDate||''));
    }
    if(it.vendorDueDate){
      return [{ id:'primary', manufactureDate:it.manufactureDate, packagingDate:it.packagingDate, vendorDueDate:it.vendorDueDate, endDate:it.vendorDueDateEnd||'', qty:it.pendingQty, scheduleStatus:it.scheduleStatus, source: it.scheduleStatus==='confirmed'?'vendor':'admin', isImplicit:true }];
    }
    return [];
  }
  // 거래처 화면에는 거래처 본인이 등록한 일정만 보여야 하므로, source==='vendor'인 배치만 걸러냅니다.
  // source가 없는(과거 데이터) 배치는 확정일정이면 거래처가 등록했을 가능성이 높다고 보고 거래처에도 보여줍니다.
  function vendorVisibleBatches(it){
    return getScheduleBatches(it).filter(b => b.source==='vendor' || (!b.source && b.scheduleStatus==='confirmed'));
  }
  function relevantBatches(it){ return session.role==='vendor' ? vendorVisibleBatches(it) : getScheduleBatches(it); }
  function batchQtySum(it){ return getScheduleBatches(it).reduce((s,b)=>s+Number(b.qty||0),0); }
  function batchEffectiveDate(b){ return b ? (b.endDate || b.vendorDueDate) : null; }
  function batchDateLabel(b){
    if(!b || !b.vendorDueDate) return '-';
    if(b.endDate && b.endDate!==b.vendorDueDate) return b.vendorDueDate+' ~ '+b.endDate;
    return b.vendorDueDate;
  }
  // 배치 목록이 바뀔 때마다, 대시보드/알림 등 기존 화면이 참고하는 "대표 단일 일정"을
  // 가장 빠른(임박한) 배치 기준으로 동기화합니다.
  function syncPrimaryScheduleFromBatches(it){
    const batches = (it.scheduleBatches||[]).slice().sort((a,b)=>(a.vendorDueDate||'').localeCompare(b.vendorDueDate||''));
    if(batches.length===0) return;
    // 거래처가 직접 등록(확정)한 배치가 있으면 그것을 최우선으로 대표 일정으로 삼습니다.
    // (관리자가 먼저 예상일정을 잠정 등록해두었더라도, 거래처가 등록하면 거래처 일정으로 교체됩니다)
    const vendorBatches = batches.filter(b=>b.source==='vendor');
    const soonest = vendorBatches.length>0 ? vendorBatches[0] : batches[0];
    it.manufactureDate = soonest.manufactureDate||'';
    it.packagingDate = soonest.packagingDate||'';
    it.vendorDueDate = soonest.vendorDueDate||'';
    it.vendorDueDateEnd = soonest.endDate||'';
    it.scheduleStatus = soonest.scheduleStatus || it.scheduleStatus;
  }

  async function terminateItem(itemId, reason){
    const it = DB.items.find(i=>i.id===itemId); if(!it) return;
    it.terminated=true; it.terminatedReason=reason||''; it.terminatedAt=new Date().toISOString();
    await saveItems();
    reallocateGroup(it.vendor, it.itemCode); await saveItems();
    document.getElementById('modal-root').innerHTML='';
    toast('남은 미입고수량을 중단 처리했습니다.'); renderTab();
  }

    return DB.receipts.filter(r=>{

      if(filters.month!=='전체' && monthKey(r.receiptDate)!==filters.month) return false;
      if(filters.q){ const q=filters.q.toLowerCase(); if((r.vendor+' '+r.itemCode).toLowerCase().indexOf(q)===-1) return false; }
      return true;
    });
  }
  // ================= ADMIN: 거래처별 대시보드 (독립 탭, 스크린샷 스타일) =================
  function renderVendorDashboard(c){
    setTitle('거래처별 대시보드', '거래처를 선택하면 발주/입고/미납 현황을 한 화면에서 확인합니다');
    if(DB.vendors.length===0){
      c.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">📭</div>등록된 거래처가 없습니다. 먼저 "외주 발주 업로드" 탭에서 엑셀을 업로드해 거래처와 발주 데이터를 등록해 주세요.</div></div>`;
      return;
    }
    if(!vendorDashSelected || !DB.vendors.some(v=>v.name===vendorDashSelected)) vendorDashSelected = allVendorNames()[0];
    const vendor = vendorDashSelected;
    const vStats = vendorMonthlyStats(vendor);
    const vOrder = vStats.reduce((s,r)=>s+r.order,0), vRecv = vStats.reduce((s,r)=>s+r.received,0), vPending = vStats.reduce((s,r)=>s+r.pending,0);
    const vManuTon = vStats.reduce((s,r)=>s+r.manuTon,0), vPendingTon = vStats.reduce((s,r)=>s+r.pendingTon,0);
    const vRate = vOrder>0 ? Math.round(vRecv/vOrder*1000)/10 : 0;
    c.innerHTML = `
      <div class="card">
        <div class="filter-bar" style="margin-bottom:0;">
          <label style="font-size:12.5px; font-weight:600;">거래처</label>
          <select id="vd-vendor-select">${allVendorNames().map(v=>`<option value="${esc(v)}" ${v===vendor?'selected':''}>${esc(v)}</option>`).join('')}</select>
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="label">발주수량</div><div class="val">${fmtNum(vOrder)}</div></div>
        <div class="kpi"><div class="label">입고수량</div><div class="val green">${fmtNum(vRecv)}</div></div>
        <div class="kpi"><div class="label">입고제조량(톤)</div><div class="val brand">${fmtTon(vManuTon)}</div></div>
        <div class="kpi"><div class="label">미납수량</div><div class="val amber">${fmtNum(vPending)}</div></div>
        <div class="kpi"><div class="label">미납제조량(톤)</div><div class="val red">${fmtTon(vPendingTon)}</div></div>
        <div class="kpi"><div class="label">납품율</div><div class="val purple">${vRate}%</div></div>
      </div>
      ${vStats.length===0 ? `<div class="card"><div class="empty-state">${esc(vendor)}에 대한 월별 데이터가 없습니다. (발주/입고 데이터를 업로드해 주세요)</div></div>` : `
      <div class="dash-grid">
        <div class="card"><h2>발주 vs 입고수량</h2><canvas id="vd-chart-order" height="220"></canvas></div>
        <div class="card"><h2>입고제조량 vs 미납제조량(톤)</h2><canvas id="vd-chart-ton" height="220"></canvas></div>
        <div class="card"><h2>미납수량 추이</h2><canvas id="vd-chart-pending" height="220"></canvas></div>
        <div class="card"><h2>납품율 추이(%)</h2><canvas id="vd-chart-rate" height="220"></canvas></div>
      </div>`}
    `;
    document.getElementById('vd-vendor-select').onchange = (e)=>{ vendorDashSelected = e.target.value; renderVendorDashboard(c); };
    if(vStats.length>0) setTimeout(()=>renderVendorDetailCharts(vendor), 0); else destroyVendorCharts();
  }

  function renderDashboard(c){
    setTitle('대시보드', '외주 제조·발주·입고 현황을 한눈에 확인합니다 (아래 필터로 거래처별 조회 가능)');
    const all = applyFilters(DB.items);
    const receiptsFiltered = filteredReceiptsForDash();
    const totalOrder = all.reduce((s,i)=>s+i.orderQty,0);
    const totalReceived = all.reduce((s,i)=>s+i.receivedQty,0);
    const totalPending = all.reduce((s,i)=>s+effPending(i),0);
    const doneCount = all.filter(i=>i.status==='입고완료' && !i.terminated).length;
    const unreg = unregisteredItemCodes();

    // ---- 월별현황 (1) 거래처·월·라인별 제조량(톤) = 미납수량 × 소요용량 (납품예정일 기준 월별 집계) ----
    // 품목이 여러 라인에 등록된 경우 라인별로 모두 산출됩니다.
    const manuTonMap = {};
    all.forEach(it=>{
      const p = effPending(it);
      if(p<=0) return;
      const masters = itemMasterAllOf(it.itemCode);
      if(masters.length===0) return; // 품목마스터 미등록 품번은 톤수 계산에서 제외 (상단 경고에 표시됨)
      const mk = monthKey(it.dueDate);
      masters.forEach(m=>{
        const line = m.line || '미지정';
        const key = mk+'|'+it.vendor+'|'+line;
        manuTonMap[key] = manuTonMap[key] || {month:mk, vendor:it.vendor, line, ton:0};
        manuTonMap[key].ton += m.requiredVolumeMl ? p*Number(m.requiredVolumeMl)/1000000 : 0;
      });
    });
    const manuTonRows = Object.values(manuTonMap).filter(r=>r.ton>0).sort((a,b)=> a.vendor.localeCompare(b.vendor,'ko') || a.month.localeCompare(b.month) || a.line.localeCompare(b.line,'ko'));
    const maxManuTon = Math.max(1, ...manuTonRows.map(r=>r.ton));
    function tonBarRows(rows, maxTon, colorClass){
      if(rows.length===0) return '<div class="empty-state">데이터가 없습니다. (품목마스터에 소요용량·라인이 등록되어 있고, 미입고수량이 있는 발주가 있어야 표시됩니다)</div>';
      return rows.map(r=>`<div class="bar-row"><div class="bar-label" style="width:220px;">${esc(r.vendor)} · ${esc(r.month)} · ${esc(r.line)}</div>
        <div class="bar-track"><div class="bar-fill ${colorClass||''}" style="width:${Math.round(r.ton/maxTon*100)}%"></div></div>
        <div class="bar-val">${fmtTon(r.ton)}톤</div></div>`).join('');
    }

    // ---- 월별현황 (2) 거래처·월·라인별 입고량(수량) ----
    const recvQtyMap = {};
    receiptsFiltered.forEach(r=>{
      const m = itemMasterOf(r.itemCode); const line = m?m.line:'미지정';
      const key = monthKey(r.receiptDate)+'|'+r.vendor+'|'+line;
      recvQtyMap[key] = recvQtyMap[key] || {month:monthKey(r.receiptDate), vendor:r.vendor, line, qty:0};
      recvQtyMap[key].qty += Number(r.qty)||0;
    });
    const recvQtyRows = Object.values(recvQtyMap).sort((a,b)=> a.vendor.localeCompare(b.vendor,'ko') || a.month.localeCompare(b.month) || a.line.localeCompare(b.line,'ko'));
    const maxRecvQty = Math.max(1, ...recvQtyRows.map(r=>r.qty));
    function qtyBarRows(rows, maxQty, colorClass){
      if(rows.length===0) return '<div class="empty-state">데이터가 없습니다.</div>';
      return rows.map(r=>`<div class="bar-row"><div class="bar-label" style="width:220px;">${esc(r.vendor)} · ${esc(r.month)} · ${esc(r.line)}</div>
        <div class="bar-track"><div class="bar-fill ${colorClass||''}" style="width:${Math.round(r.qty/maxQty*100)}%"></div></div>
        <div class="bar-val">${fmtNum(r.qty)}</div></div>`).join('');
    }

    // ---- 월별현황 (3) 거래처·월별 발주 대비 납품완료 수량(표) ----
    const vmMap = {};
    all.forEach(it=>{
      const key = monthKey(it.dueDate)+'|'+it.vendor;
      vmMap[key] = vmMap[key] || {month:monthKey(it.dueDate), vendor:it.vendor, order:0, received:0};
      vmMap[key].order += it.orderQty; vmMap[key].received += it.receivedQty;
    });
    const vmRows = Object.values(vmMap).sort((a,b)=> b.month.localeCompare(a.month) || a.vendor.localeCompare(b.vendor,'ko'));

    // ---- 현재현황 (4) 거래처별 발주/입고 진척도(그래프) ----
    const vendorProgMap = {};
    all.forEach(it=>{
      vendorProgMap[it.vendor] = vendorProgMap[it.vendor] || {vendor:it.vendor, order:0, received:0};
      vendorProgMap[it.vendor].order += it.orderQty; vendorProgMap[it.vendor].received += it.receivedQty;
    });
    const vendorProgRows = Object.values(vendorProgMap).sort((a,b)=>b.order-a.order);

    // ---- 현재현황 (5) 거래처별 미입고수량 · 잔여 제조필요량(톤) (표) — 세트/콤보 품목처럼 한 품번이 여러 라인(구성품)에 걸쳐 등록된 경우 각 라인의 소요용량을 모두 합산합니다 ----
    const remainMap = {};
    const remainMissing = {};
    all.forEach(it=>{
      const p = effPending(it);
      remainMap[it.vendor] = remainMap[it.vendor] || {vendor:it.vendor, pendingQty:0, ton:0};
      remainMap[it.vendor].pendingQty += p;
      if(p<=0) return;
      const masters = itemMasterAllOf(it.itemCode);
      if(masters.length===0){ remainMissing[it.vendor] = (remainMissing[it.vendor]||0)+1; return; }
      masters.forEach(m=>{ remainMap[it.vendor].ton += tonsWithVolume(p, m.requiredVolumeMl); });
    });
    const remainRows = Object.values(remainMap).filter(r=>r.pendingQty>0).sort((a,b)=>b.pendingQty-a.pendingQty);

    c.innerHTML = `
      <div class="kpi-row">
        <div class="kpi"><div class="label">전체 품목 수</div><div class="val">${fmtNum(all.length)}</div></div>
        <div class="kpi"><div class="label">외주거래처 수</div><div class="val brand">${fmtNum(DB.vendors.length)}</div></div>
        <div class="kpi"><div class="label">발주수량 합계</div><div class="val">${fmtNum(totalOrder)}</div></div>
        <div class="kpi"><div class="label">미입고수량 합계</div><div class="val amber">${fmtNum(totalPending)}</div></div>
        <div class="kpi"><div class="label">입고완료 건수</div><div class="val green">${fmtNum(doneCount)}</div></div>
      </div>
      ${unreg.length ? `<div class="section-note crit">⚠ 품목마스터에 등록되지 않은 품번이 ${unreg.length}건 있습니다 (${unreg.slice(0,8).map(esc).join(', ')}${unreg.length>8?' 외':''}). 소요용량·라인 계산에서 제외되니 <b>품목마스터</b> 메뉴에서 등록해 주세요.</div>` : ''}
      <div class="card">${filterBarHtml({exportRows:false})}</div>

      <h2 style="margin:20px 0 10px; font-size:15px;">1. 월별 현황</h2>
      <div class="card">
        <h2><span class="eyebrow">(1)</span> 거래처·월·라인별 제조량(톤)</h2>
        <div class="section-note">미입고(미납)수량 × 품목별 소요용량을 톤으로 환산해 <b>납품예정일 기준 월</b>로 집계한 값입니다. (품목마스터 미등록 품번은 제외됩니다)</div>
        <div style="max-height:320px; overflow-y:auto;">${tonBarRows(manuTonRows, maxManuTon)}</div>
      </div>
      <div class="card">
        <h2><span class="eyebrow">(2)</span> 거래처·월·라인별 입고량(수량)</h2>
        <div style="max-height:320px; overflow-y:auto;">${qtyBarRows(recvQtyRows, maxRecvQty, 'b2')}</div>
      </div>
      <div class="card">
        <h2><span class="eyebrow">(3)</span> 거래처·월별 총 발주 대비 납품완료 수량</h2>
        <div class="table-wrap"><table><thead><tr><th>월(납품예정)</th><th>외주거래처</th><th>발주수량</th><th>납품완료수량</th><th>달성률</th></tr></thead><tbody>
          ${vmRows.length===0?`<tr><td colspan="5"><div class="empty-state">데이터가 없습니다.</div></td></tr>`:
          vmRows.map(r=>`<tr><td class="mono-cell">${esc(r.month)}</td><td>${esc(r.vendor)}</td><td class="mono-cell">${fmtNum(r.order)}</td><td class="mono-cell">${fmtNum(r.received)}</td><td class="mono-cell">${r.order>0?Math.round(r.received/r.order*100):0}%</td></tr>`).join('')}
        </tbody></table></div>
      </div>

      <h2 style="margin:20px 0 10px; font-size:15px;">2. 현재현황</h2>
      <div class="card">
        <h2><span class="eyebrow">(4)</span> 거래처별 발주 및 입고 진척도</h2>
        ${vendorProgRows.length===0?'<div class="empty-state">데이터가 없습니다.</div>':vendorProgRows.map(r=>{
          const pct = r.order>0 ? Math.min(100, Math.round(r.received/r.order*100)) : 0;
          return `<div class="bar-row"><div class="bar-label">${esc(r.vendor)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="bar-val">${fmtNum(r.received)}/${fmtNum(r.order)} (${pct}%)</div></div>`;
        }).join('')}
      </div>
      <div class="card">
        <h2><span class="eyebrow">(5)</span> 거래처별 총 미입고수량 · 잔여 제조필요량(톤)</h2>
        <div class="table-wrap"><table><thead><tr><th>외주거래처</th><th>미입고수량</th><th>잔여 제조필요량(톤)</th></tr></thead><tbody>
          ${remainRows.length===0?`<tr><td colspan="3"><div class="empty-state">데이터가 없습니다.</div></td></tr>`:
          remainRows.map(r=>`<tr><td>${esc(r.vendor)}</td><td class="mono-cell" style="color:var(--amber); font-weight:700;">${fmtNum(r.pendingQty)}</td><td class="mono-cell">${fmtTon(r.ton)}</td></tr>`).join('')}
        </tbody></table></div>
        ${Object.keys(remainMissing).length?`<div class="section-note warn" style="margin-top:10px;">품목마스터 미등록으로 톤수 계산에서 제외된 건: ${Object.entries(remainMissing).map(([v,n])=>`${esc(v)}(${n}건)`).join(', ')}</div>`:''}
      </div>
      ${filters.vendor!=='전체' ? (function(){
        const vStats = vendorMonthlyStats(filters.vendor);
        const vOrder = vStats.reduce((s,r)=>s+r.order,0), vRecv = vStats.reduce((s,r)=>s+r.received,0), vPending = vStats.reduce((s,r)=>s+r.pending,0);
        const vManuTon = vStats.reduce((s,r)=>s+r.manuTon,0), vPendingTon = vStats.reduce((s,r)=>s+r.pendingTon,0);
        const vRate = vOrder>0 ? Math.round(vRecv/vOrder*1000)/10 : 0;
        return `
      <h2 style="margin:20px 0 10px; font-size:15px;">📋 ${esc(filters.vendor)} 상세 대시보드</h2>
      <div class="kpi-row">
        <div class="kpi"><div class="label">발주수량</div><div class="val">${fmtNum(vOrder)}</div></div>
        <div class="kpi"><div class="label">입고수량</div><div class="val green">${fmtNum(vRecv)}</div></div>
        <div class="kpi"><div class="label">입고제조량(톤)</div><div class="val brand">${fmtTon(vManuTon)}</div></div>
        <div class="kpi"><div class="label">미납수량</div><div class="val amber">${fmtNum(vPending)}</div></div>
        <div class="kpi"><div class="label">미납제조량(톤)</div><div class="val red">${fmtTon(vPendingTon)}</div></div>
        <div class="kpi"><div class="label">납품율</div><div class="val purple">${vRate}%</div></div>
      </div>
      <div class="dash-grid">
        <div class="card"><h2>발주 vs 입고수량</h2><canvas id="vd-chart-order" height="220"></canvas></div>
        <div class="card"><h2>입고제조량 vs 미납제조량(톤)</h2><canvas id="vd-chart-ton" height="220"></canvas></div>
        <div class="card"><h2>미납수량 추이</h2><canvas id="vd-chart-pending" height="220"></canvas></div>
        <div class="card"><h2>납품율 추이(%)</h2><canvas id="vd-chart-rate" height="220"></canvas></div>
      </div>`;
      })() : ''}
    `;
    bindFilterBar(()=>renderDashboard(c));
    if(filters.vendor!=='전체'){ setTimeout(()=>renderVendorDetailCharts(filters.vendor), 0); } else { destroyVendorCharts(); }
  }

  // ================= ADMIN: 임박·미납 관리 =================
  function renderAlerts(c){
    setTitle('임박·미납 관리', '전체 미납 현황과, 입고예정일이 임박했거나 이미 지난 미입고 품목을 확인·관리합니다');
    const today = todayStr();
    const twoWeeksLater = addBizDaysCalendar(today, 14);
    function addBizDaysCalendar(d,n){ const dt=new Date(d+'T00:00:00'); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); }
    const active = DB.items.filter(it=>!it.terminated && !it.isHistorical && it.pendingQty>0);
    const upcoming = active.filter(it=> it.vendorDueDate && it.vendorDueDate>=today && it.vendorDueDate<=twoWeeksLater)
      .sort((a,b)=>a.vendorDueDate.localeCompare(b.vendorDueDate));
    const overdue = active.filter(it=> it.vendorDueDate && it.vendorDueDate<today)
      .sort((a,b)=>a.vendorDueDate.localeCompare(b.vendorDueDate));
    const noSchedule = active.filter(it=>!it.vendorDueDate);
    const allPending = applyFilters(DB.items.filter(it=>!it.terminated && it.pendingQty>0)).sort((a,b)=>(a.poDate||'').localeCompare(b.poDate||''));
    function rowsHtml(list, colorKey){
      if(list.length===0) return `<div class="empty-state">해당 항목이 없습니다.</div>`;
      return `<div class="table-wrap"><table><thead><tr><th>외주거래처</th><th>발주번호</th><th>품번</th><th>품명</th><th>입고예정일(거래처)</th><th>미입고수량</th><th>${colorKey==='overdue'?'지연일수':'D-day'}</th><th></th></tr></thead><tbody>
        ${list.map(it=>{
          const d = daysBetween(today, it.vendorDueDate);
          const dtxt = colorKey==='overdue' ? `<span style="color:var(--red); font-weight:700;">D+${Math.abs(d)}</span>` : `<span style="color:var(--amber); font-weight:700;">D${d===0?'-day':(d>0?('-'+d):d)}</span>`;
          return `<tr><td>${esc(it.vendor)}</td><td class="mono-cell">${esc(it.poNumber)}</td><td class="mono-cell">${esc(it.itemCode)}</td><td>${esc(it.itemName)}</td>
          <td class="mono-cell">${esc(it.vendorDueDate)}</td><td class="mono-cell">${fmtNum(it.pendingQty)}</td><td>${dtxt}</td>
          <td><button class="btn small" data-detail="${it.id}">상세</button></td></tr>`;
        }).join('')}
      </tbody></table></div>`;
    }
    c.innerHTML = `
      <div class="kpi-row">
        <div class="kpi"><div class="label">전체 미입고 품목</div><div class="val">${fmtNum(allPending.length)}</div></div>
        <div class="kpi"><div class="label">2주 이내 입고예정</div><div class="val amber">${fmtNum(upcoming.length)}</div></div>
        <div class="kpi"><div class="label">입고예정일 초과(미납)</div><div class="val red">${fmtNum(overdue.length)}</div></div>
        <div class="kpi"><div class="label">일정 미등록 품목</div><div class="val">${fmtNum(noSchedule.length)}</div></div>
      </div>

      <div class="card"><h2><span class="eyebrow">전체</span> 미납 현황 (발주일 빠른 순, ${fmtNum(allPending.length)}건)</h2>

        ${rows.length===0?`<tr><td colspan="6"><div class="empty-state">데이터가 없습니다.</div></td></tr>`:

  // ================= ADMIN: 외주 발주 업로드 =================
  // 컬럼명은 열 위치가 아니라 "헤더 텍스트"로 탐색하므로, 실제 ERP 리포트에서 열 순서가 바뀌어도 문제없습니다.
  const HEADER_MAP = {
    poDate:['발주일','외주발주일'], dueDate:['납품예정일','납기일'], poNumber:['발주번호','외주발주번호'],
    vendor:['외주거래처','구매거래처'], itemCode:['품번','외주품번호','제품번호'], itemName:['품명','외주품명','제품명'],
    orderQty:['발주수량'], warehouse:['창고','입고창고','납품창고'], uom:['단위'],
    pendingQtyFile:['미납수량'], deliveredQtyFile:['납품수량'], terminatedFlag:['중단'], workOrderNo:['작업지시번호']
  };
  function findSheetAndHeaderRow(wb, findHeaderRowFn){
    for(const sheetName of wb.SheetNames){
      const ws = wb.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:''});
      const headerIdx = findHeaderRowFn(rows);
      if(headerIdx!==-1) return {sheetName, rows, headerIdx};
    }
    return null;
  }
  function findHeaderRow(rows){
    for(let i=0;i<Math.min(rows.length,12);i++){
      const row=(rows[i]||[]).map(h=>String(h||'').trim());
      const hasVendor = row.some(h=>h.indexOf('거래처')!==-1);
      const hasPoNumber = row.some(h=>h.indexOf('발주번호')!==-1);
      if(hasVendor && hasPoNumber) return i;
    }
    return -1;
  }
  function parseOrderWorkbook(wb){
    const found = findSheetAndHeaderRow(wb, findHeaderRow);
    if(!found) throw new Error('헤더 행을 찾을 수 없습니다. "거래처", "발주번호" 문구가 포함된 컬럼이 있는 시트인지 확인해 주세요 (여러 시트가 있는 경우 모든 시트를 확인했습니다). 엑셀 파일을 잘못된 메뉴에 올린 것은 아닌지도 확인해 주세요 — 이 메뉴는 "외주발주" 데이터용이며, "입고" 데이터는 입고등록 메뉴를 이용해 주세요.');
    const { rows, headerIdx } = found;
    const header = rows[headerIdx]; const col = {};
    for(const key in HEADER_MAP){ const idx = findColIndex(header, HEADER_MAP[key]); if(idx!==-1) col[key]=idx; }
    const required = ['poDate','dueDate','poNumber','vendor','itemCode','itemName','orderQty'];
    const missing = required.filter(r=>col[r]===undefined);
    if(missing.length) throw new Error('필수 컬럼을 찾을 수 없습니다: '+missing.join(', '));
    const records = [];
    for(let i=headerIdx+1;i<rows.length;i++){
      const row = rows[i];
      if(!row || row.every(v=>v===''||v===undefined||v===null)) continue;
      const vendor = String(row[col.vendor]||'').trim();
      const poNumber = String(row[col.poNumber]||'').trim();
      if(!vendor || !poNumber) continue;
      const terminatedFlag = col.terminatedFlag!==undefined ? String(row[col.terminatedFlag]||'').trim() : '';
      records.push({
        poDate:String(row[col.poDate]||'').trim(), dueDate:String(row[col.dueDate]||'').trim(), poNumber, vendor,
        itemCode:String(row[col.itemCode]||'').trim(), itemName:String(row[col.itemName]||'').trim(),
        orderQty:parseNum(row[col.orderQty]), warehouse: col.warehouse!==undefined?String(row[col.warehouse]||'').trim():'',
        uom: col.uom!==undefined?String(row[col.uom]||'').trim():'',
        workOrderNo: col.workOrderNo!==undefined?String(row[col.workOrderNo]||'').trim():'',
        pendingQtyFile: col.pendingQtyFile!==undefined ? parseNum(row[col.pendingQtyFile]) : null,
        deliveredQtyFile: col.deliveredQtyFile!==undefined ? parseNum(row[col.deliveredQtyFile]) : null,
        terminated: terminatedFlag==='1' || terminatedFlag.toUpperCase()==='TRUE' || terminatedFlag==='Y'
      });
    }
    return records;
  }
  function upsertOrderRecords(records, opts){
    opts = opts||{};
    let added=0, updated=0, newVendors=0;
    const existing = new Set(DB.vendors.map(v=>v.name));
    const touched = new Set();
    const seenKeys = new Map();
    const dupWithinBatch = [];
    const qtyAnomalies = [];
    for(const rec of records){
      if(!existing.has(rec.vendor)){
        DB.vendors.push({id:uid(), name:rec.vendor, token:genToken(rec.vendor), createdAt:new Date().toISOString()});
        existing.add(rec.vendor); newVendors++;
      }
      const key = rec.poNumber+'|'+rec.itemCode+'|'+rec.warehouse+'|'+(rec.workOrderNo||'');
      if(seenKeys.has(key)){
        dupWithinBatch.push(rec.poNumber+'/'+rec.itemCode+(rec.workOrderNo?' (작업지시 '+rec.workOrderNo+')':''));
      }
      seenKeys.set(key, true);
      let item = DB.items.find(it=>it._key===key);
      if(item){
        const prevQty = item.orderQty;
        if(prevQty>0 && Math.abs(rec.orderQty-prevQty)/prevQty > 0.5){
          qtyAnomalies.push(`${rec.poNumber}/${rec.itemCode}: ${fmtNum(prevQty)} → ${fmtNum(rec.orderQty)}`);
        }
        item.orderQty=rec.orderQty; item.dueDate=rec.dueDate; item.poDate=rec.poDate; item.itemName=rec.itemName; item.uom=rec.uom; item.workOrderNo=rec.workOrderNo||'';
        if(rec.terminated && !item.terminated){ item.terminated=true; item.terminatedReason='ERP 업로드 파일 기준 중단표시'; item.terminatedAt=new Date().toISOString(); }
        item.updatedAt = new Date().toISOString(); updated++;
      } else {
        item = {
          id:uid(), _key:key, poNumber:rec.poNumber, poDate:rec.poDate, dueDate:rec.dueDate, vendor:rec.vendor,
          itemCode:rec.itemCode, itemName:rec.itemName, orderQty:rec.orderQty, warehouse:rec.warehouse, uom:rec.uom, workOrderNo:rec.workOrderNo||'',
          manufactureDate:'', packagingDate:'', vendorDueDate:'', scheduleUpdatedAt:null,
          receivedQty:0, pendingQty:rec.orderQty, status:'진행중', isHistorical: !!opts.isHistorical,
          terminated: !!rec.terminated, terminatedReason: rec.terminated?'ERP 업로드 파일 기준 중단표시':'', terminatedAt: rec.terminated?new Date().toISOString():null,
          createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
        };
        DB.items.push(item);
        added++;
        // ERP 파일에 "납품수량"(직접) 또는 "미납수량"(발주수량-미납수량으로 역산)이 있으면
        // 신규 등록 시 이미 입고된 분을 합성 입고 레코드로 자동 반영합니다.
        let delivered = 0;
        if(rec.deliveredQtyFile!==null && rec.deliveredQtyFile!==undefined) delivered = rec.deliveredQtyFile;
        else if(rec.pendingQtyFile!==null && rec.pendingQtyFile!==undefined) delivered = Math.max(0, rec.orderQty - rec.pendingQtyFile);
        if(delivered>0){
          const syncId = 'sync_'+item.id;
          if(!DB.receipts.find(r=>r.id===syncId)){
            DB.receipts.push({id:syncId, vendor:rec.vendor, itemCode:rec.itemCode, itemName:rec.itemName, receiptDate:rec.poDate||todayStr(), qty:delivered, warehouse:rec.warehouse||'', note:'업로드 파일 기존 입고분(자동 반영)', imageAttached:false, imageKey:null, isHistorical:true, createdAt:new Date().toISOString()});
          }
        }
      }
      touched.add(rec.vendor+'|'+rec.itemCode);
    }
    touched.forEach(k=>{ const [vendor,itemCode]=k.split('|'); reallocateGroup(vendor,itemCode); });
    return {added, updated, newVendors, dupWithinBatch, qtyAnomalies};
  }
  function renderUpload(c){
    setTitle('외주 발주 업로드', '외주거래처 기준 발주 데이터를 엑셀 업로드 또는 수기 입력으로 등록합니다');
    const unreg = unregisteredItemCodes();
    c.innerHTML = `
      ${unreg.length?`<div class="section-note crit">⚠ 품목마스터 미등록 품번 ${unreg.length}건: ${unreg.slice(0,10).map(esc).join(', ')}${unreg.length>10?' 외':''} — <b>품목마스터</b> 메뉴에서 소요용량·라인을 등록해 주세요.</div>`:''}
      <div class="card">
        <h2><span class="eyebrow">STEP 1</span> 엑셀 파일 업로드</h2>
        <div class="section-note">필요 컬럼(헤더 텍스트로 자동 인식, 열 위치 무관): <b>발주일(또는 외주발주일), 납품예정일(또는 납기일), 발주번호(또는 외주발주번호), 외주거래처, 품번(또는 외주품번호/제품번호), 품명, 발주수량, 창고(선택)</b>. "미납수량" 또는 "납품수량" 컬럼이 있으면 신규 등록 시 기존 입고분이 자동 반영됩니다. "중단" 컬럼이 1/Y면 자동으로 중단처리됩니다. 이미 등록된 발주(발주번호+품번+창고 기준)는 최신 값으로 갱신되고, 새로운 외주거래처는 자동 등록되어 접속 토큰이 발급됩니다.</div>

        <input type="file" id="file-input" accept=".xlsx,.xls"/>

      </div>

        </div>
        <label style="display:flex; align-items:center; gap:6px; font-size:12.5px; margin-bottom:10px;"><input type="checkbox" id="m-historical" style="width:auto;"/> 과거 이력 데이터로 등록</label>
        <button class="btn primary" id="m-save">발주 등록</button>
        <div id="manual-result" style="margin-top:10px;"></div>
      </div>
    `;
    document.getElementById('file-input').onchange = async (e)=>{
      const file = e.target.files[0]; if(!file) return;
      const isHistorical = document.getElementById('up-historical').checked;
      const resultEl = document.getElementById('upload-result');
      resultEl.innerHTML = `<div class="section-note">파일을 읽는 중입니다...</div>`;

        await saveVendors(); await saveItems(); await saveReceipts();

        resultEl.innerHTML = `<div class="section-note" style="border-color:var(--brand); background:var(--green-bg); color:var(--green);">업로드 완료 · 총 ${fmtNum(records.length)}행 — 신규 ${fmtNum(res.added)}건, 갱신 ${fmtNum(res.updated)}건, 신규거래처 ${fmtNum(res.newVendors)}곳${isHistorical?' · 이력데이터로 등록됨':''}</div>

  const IM_HEADER_MAP = { itemCode:['품번','외주품번호','제품번호'], itemName:['품명','외주품명','제품명'], requiredVolumeMl:['소요용량(ml)','소요용량(mL)','소요용량','용량'], line:['라인'], channel:['채널','권역','판매채널'] };
  function findItemMasterHeaderRow(rows){
    for(let i=0;i<Math.min(rows.length,12);i++){
      const row=(rows[i]||[]).map(h=>String(h||'').trim());

      const hasVolume = row.some(h=>h.indexOf('용량')!==-1);

  function parseItemMasterWorkbook(wb){
    const found = findSheetAndHeaderRow(wb, findItemMasterHeaderRow);
    if(!found) throw new Error('헤더 행("품번"과 "용량"이 모두 포함된 컬럼)을 찾을 수 없습니다. 파일에 여러 시트가 있는 경우 모든 시트를 확인했습니다.');
    const { rows, headerIdx } = found;
    const header = rows[headerIdx]; const col={};
    for(const key in IM_HEADER_MAP){ const idx = findColIndex(header, IM_HEADER_MAP[key]); if(idx!==-1) col[key]=idx; }
    if(col.itemCode===undefined || col.requiredVolumeMl===undefined) throw new Error('필수 컬럼(품번, 소요용량)을 찾을 수 없습니다.');
    const records=[];
    for(let i=headerIdx+1;i<rows.length;i++){
      const row=rows[i]; if(!row||row.every(v=>v===''||v===undefined||v===null)) continue;
      const itemCode = String(row[col.itemCode]||'').trim(); if(!itemCode) continue;
      records.push({ itemCode, itemName: col.itemName!==undefined?String(row[col.itemName]||'').trim():'', requiredVolumeMl: parseNum(row[col.requiredVolumeMl]), line: col.line!==undefined?String(row[col.line]||'').trim():'', channel: col.channel!==undefined?String(row[col.channel]||'').trim():'' });
    }
    return records;
  }
  function upsertItemMaster(records){
    let added=0, updated=0;
    for(const rec of records){
      let m = DB.itemMaster.find(x=>x.itemCode===rec.itemCode && String(x.line||'').trim()===String(rec.line||'').trim());
      if(m){ m.itemName=rec.itemName||m.itemName; m.requiredVolumeMl=rec.requiredVolumeMl; if(rec.channel) m.channel=rec.channel; updated++; }
      else{ DB.itemMaster.push({id:uid(), itemCode:rec.itemCode, itemName:rec.itemName, requiredVolumeMl:rec.requiredVolumeMl, line:rec.line, channel:rec.channel||'', createdAt:new Date().toISOString()}); added++; }
    }
    return {added,updated};
  }

  // ================= ADMIN: 입고등록 (엑셀 업로드형, FIFO 자동배분) =================
  const RC_HEADER_MAP = {
    vendor:['외주거래처','구매거래처'], itemCode:['품번','외주품번호'], itemName:['품명','외주품명'],
    receiptDate:['입고일','외주입고일'], qty:['입고수량'], warehouse:['창고','입고창고'],
    note:['비고','기타사항','특이사항'], poNumber:['발주번호','외주발주번호'], returnFlag:['반품여부','반품구분','구분']
  };
  function findReceiptHeaderRow(rows){
    for(let i=0;i<Math.min(rows.length,12);i++){
      const row=(rows[i]||[]).map(h=>String(h||'').trim());
      const hasVendor = row.some(h=>h.indexOf('거래처')!==-1);
      const hasQty = row.some(h=>h.indexOf('입고수량')!==-1);
      if(hasVendor && hasQty) return i;
    }
    return -1;
  }
  function parseReceiptWorkbook(wb){
    const found = findSheetAndHeaderRow(wb, findReceiptHeaderRow);
    if(!found) throw new Error('헤더 행을 찾을 수 없습니다. "거래처", "입고수량" 문구가 포함된 컬럼이 있는 시트인지 확인해 주세요 (여러 시트가 있는 경우 모든 시트를 확인했습니다). 엑셀 파일을 잘못된 메뉴에 올린 것은 아닌지도 확인해 주세요 — 이 메뉴는 "입고" 데이터용이며, "외주발주" 데이터는 외주발주업로드 메뉴를 이용해 주세요.');
    const { rows, headerIdx } = found;
    const header = rows[headerIdx]; const col={};
    for(const key in RC_HEADER_MAP){ const idx = findColIndex(header, RC_HEADER_MAP[key]); if(idx!==-1) col[key]=idx; }
    const required = ['vendor','itemCode','receiptDate','qty'];
    const missing = required.filter(r=>col[r]===undefined);
    if(missing.length) throw new Error('필수 컬럼을 찾을 수 없습니다: '+missing.join(', '));
    const records=[];
    for(let i=headerIdx+1;i<rows.length;i++){
      const row=rows[i]; if(!row||row.every(v=>v===''||v===undefined||v===null)) continue;
      const vendor = String(row[col.vendor]||'').trim(); const itemCode=String(row[col.itemCode]||'').trim();
      if(!vendor || !itemCode) continue;
      const returnFlagText = col.returnFlag!==undefined ? String(row[col.returnFlag]||'').trim() : '';
      let qty = parseNum(row[col.qty]);
      const isReturn = returnFlagText.indexOf('반품')!==-1 || qty<0;
      if(isReturn) qty = -Math.abs(qty);
      records.push({
        vendor, itemCode, itemName: col.itemName!==undefined?String(row[col.itemName]||'').trim():'',
        receiptDate:String(row[col.receiptDate]||'').trim(), qty, isReturn,
        warehouse: col.warehouse!==undefined?String(row[col.warehouse]||'').trim():'',
        note: col.note!==undefined?String(row[col.note]||'').trim():'',
        poNumber: col.poNumber!==undefined?String(row[col.poNumber]||'').trim():''
      });
    }
    return records;
  }
  function renderReceiveUpload(c){
    setTitle('입고등록', '입고완료 리스트를 업로드하면 발주일 순서(FIFO)로 자동 배분되어 완납/부분납품/미납이 계산됩니다');
    c.innerHTML = `
      <div class="section-note">동일 거래처·품번에 대해 여러 발주건이 있는 경우, 입고수량은 <b>발주일이 빠른 순서</b>대로 자동 배분됩니다. (예: 4/1 발주 1만개 + 5/7 발주 1.5만개 상태에서 입고 2만개 등록 시 → 4/1건 완납, 5/7건 1만 부분입고 + 5천 미입고)</div>
      <div class="section-note">↩ <b>반품이 발생한 경우</b> "반품" 체크박스로 등록하면 마이너스 입고로 처리되어, 입고수량에서 반품 수량만큼 차감되고 그만큼 미납수량이 다시 살아납니다. (예: 7/1 입고 1만개 → 7/5 반품 6천개 등록 → 최종 입고수량 4천개, 미납수량 6천개로 자동 재계산)</div>
      <div class="section-note">📌 과거 입고 실적(이력)은 입고일을 과거 날짜로 지정하고 아래 <b>"과거 이력 데이터로 등록"</b>을 체크해 주세요. <b>이 경우 미납수량(FIFO 배분) 계산에는 반영되지 않고</b>, 대시보드 "월별 현황"의 실적 집계에만 즉시 반영됩니다. 매칭되는 발주 데이터가 없어도 문제없이 저장되며, 명세서(이미지) 첨부는 선택사항입니다.</div>
      <div class="card">
        <h2><span class="eyebrow">STEP 1</span> 입고완료 리스트 엑셀 업로드</h2>
        <div class="section-note">필요 컬럼: <b>외주거래처, 품번, 품명(선택), 입고일, 입고수량, 창고(선택), 비고(선택), 반품여부(선택 — "반품"이 포함되어 있거나 입고수량이 음수면 자동으로 마이너스 처리)</b></div>
        <input type="file" id="rc-file" accept=".xlsx,.xls"/>
        <label style="display:flex; align-items:center; gap:6px; margin-top:10px; font-size:12.5px; cursor:pointer;"><input type="checkbox" id="rc-historical-file"/> 이 업로드는 과거 이력 데이터입니다 (미납수량 계산에서 제외, 월별 집계에는 포함)</label>
        <div id="rc-upload-result" style="margin-top:14px;"></div>
      </div>
      <div class="card">
        <h2><span class="eyebrow">STEP 2</span> 수기 1건 등록</h2>
        <div class="field-row">
          <div class="field"><label>외주거래처 <span class="req">*</span></label><input type="text" id="rc-vendor" list="vendor-datalist2"/><datalist id="vendor-datalist2">${DB.vendors.map(v=>`<option value="${esc(v.name)}"></option>`).join('')}</datalist></div>
          <div class="field"><label>품번 <span class="req">*</span></label><input type="text" id="rc-code"/></div>
        </div>
        <div class="field-row">
          <div class="field"><label>품명</label><input type="text" id="rc-name" placeholder="선택 입력 (미입력 시 발주데이터에서 자동 매칭)"/></div>
          <div class="field"><label>입고일 <span class="req">*</span></label><input type="date" id="rc-date" value="${todayStr()}"/></div>
        </div>
        <div class="field-row">
          <div class="field"><label>입고수량 <span class="req">*</span></label><input type="number" id="rc-qty" min="1"/><div class="hint">반품인 경우에도 반품 수량을 양수로 입력하세요 (아래 "반품" 체크)</div></div>
          <div class="field"><label>창고</label><input type="text" id="rc-wh"/></div>
        </div>
        <div class="field"><label>비고</label><input type="text" id="rc-note"/></div>
        <div class="field"><label>명세서 이미지(선택 — 첨부하지 않아도 됩니다)</label><input type="file" id="rc-img" accept="image/*"/></div>
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:8px; font-size:12.5px; cursor:pointer;"><input type="checkbox" id="rc-return"/> 반품(마이너스 입고) — 이미 입고된 수량 중 반품된 만큼 차감하고, 그만큼 미납수량을 다시 살립니다</label>
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:12px; font-size:12.5px; cursor:pointer;"><input type="checkbox" id="rc-historical-manual"/> 과거 이력 데이터로 등록 (미납수량 계산에서 제외, 월별 집계에는 포함)</label>
        <button class="btn primary" id="rc-save">입고 등록</button>
        <div id="rc-manual-result" style="margin-top:10px;"></div>
      </div>
      <div class="card">
        <h2><span class="eyebrow">최근 등록</span> 입고 등록 내역 (${fmtNum(DB.receipts.length)}건)</h2>
        <div class="table-wrap"><table><thead><tr><th>외주거래처</th><th>품번</th><th>품명</th><th>입고일</th><th>입고수량</th><th>창고</th><th>명세서</th><th></th></tr></thead><tbody>
          ${DB.receipts.length===0?`<tr><td colspan="8"><div class="empty-state">등록된 입고 내역이 없습니다.</div></td></tr>`:
          DB.receipts.slice().sort((a,b)=>(b.receiptDate||'').localeCompare(a.receiptDate||'')).slice(0,50).map(r=>`<tr>
            <td>${esc(r.vendor)}</td><td class="mono-cell">${esc(r.itemCode)}</td><td>${esc(receiptItemName(r))}${r.isHistorical?' <span class="tag-chip" style="background:#EEE; color:var(--muted);" title="과거 이력 데이터">이력</span>':''}</td><td class="mono-cell">${esc(r.receiptDate)}</td><td>${qtyCell(r)}</td><td>${esc(r.warehouse)}</td>
            <td>${r.imageAttached?'<span class="tag-chip chip-attached">✓ 첨부완료</span>':'<span class="tag-chip chip-missing">명세서 없음</span>'}</td>
            <td style="white-space:nowrap;">
              ${r.imageAttached?`<button class="btn small" data-view-r="${r.id}">보기</button>`:`<button class="btn small" data-attach-r="${r.id}">명세서 첨부</button>`}
              <button class="btn small" data-edit-r="${r.id}">수정</button>
              <button class="btn small danger" data-del-r="${r.id}">삭제</button>
            </td>
          </tr>`).join('')}
        </tbody></table></div>
      </div>
    `;
    document.getElementById('rc-file').onchange = async (e)=>{
      const file=e.target.files[0]; if(!file) return;
      const isHist = document.getElementById('rc-historical-file').checked;
      const resEl = document.getElementById('rc-upload-result');
      resEl.innerHTML = `<div class="section-note">파일을 읽는 중입니다...</div>`;
      try{
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, {type:'array', cellDates:false});
        const records = parseReceiptWorkbook(wb);
        if(records.length===0) throw new Error('유효한 데이터 행을 찾지 못했습니다.');
        const touched = new Set();
        const dupWarnings = [];
        records.forEach(rec=>{
          const dupes = findExactDuplicateReceipts(rec.vendor, rec.itemCode, rec.receiptDate, rec.qty);
          if(dupes.length>0) dupWarnings.push(`${rec.vendor}/${rec.itemCode}/${rec.receiptDate}/${fmtNum(rec.qty)}`);
          DB.receipts.push({id:uid(), vendor:rec.vendor, itemCode:rec.itemCode, itemName:rec.itemName, receiptDate:rec.receiptDate, qty:rec.qty, warehouse:rec.warehouse, note:rec.note, imageAttached:false, imageKey:null, isHistorical:isHist, excludeFromAllocation:isHist, isReturn:!!rec.isReturn, createdAt:new Date().toISOString()});
          touched.add(rec.vendor+'|'+rec.itemCode);
        });
        touched.forEach(k=>{ const [vendor,itemCode]=k.split('|'); reallocateGroup(vendor,itemCode); });
        await saveReceipts(); await saveItems();
        const overflowWarnings = [];
        if(!isHist){
          touched.forEach(k=>{
            const [vendor,itemCode]=k.split('|');
            const overflow = computeGroupOverflow(vendor,itemCode);
            if(overflow>0) overflowWarnings.push(`${vendor}/${itemCode}: 발주수량 대비 ${fmtNum(overflow)} 초과`);
          });
        }
        resEl.innerHTML = `<div class="section-note" style="border-color:var(--brand); background:var(--green-bg); color:var(--green);">업로드 완료 · ${fmtNum(records.length)}건 등록 및 자동 배분되었습니다.${isHist?' · 이력데이터로 등록됨':''}</div>
          ${dupWarnings.length?`<div class="section-note warn" style="margin-top:8px;">⚠ 동일한 거래처/품번/입고일/수량 조합이 이미 있어 중복 등록일 수 있는 건 ${dupWarnings.length}건: ${dupWarnings.slice(0,8).map(esc).join(', ')}${dupWarnings.length>8?' 외':''}</div>`:''}
          ${overflowWarnings.length?`<div class="section-note warn" style="margin-top:8px;">⚠ 입고수량 합계가 발주수량 합계를 초과한 품번 ${overflowWarnings.length}건: ${overflowWarnings.slice(0,8).map(esc).join(', ')}${overflowWarnings.length>8?' 외':''} — 중복 입력이나 반품 누락 여부를 확인해 주세요.</div>`:''}`;
        toast('입고 데이터가 등록되었습니다.');
        setTimeout(()=>renderReceiveUpload(document.getElementById('content')), 700);
      }catch(err){ resEl.innerHTML = `<div class="badge-error" style="position:static;">업로드 실패: ${esc(err.message)}</div>`; }
    };
    document.getElementById('rc-save').onclick = async ()=>{
      const resEl = document.getElementById('rc-manual-result');
      const vendor = document.getElementById('rc-vendor').value.trim();
      const itemCode = document.getElementById('rc-code').value.trim();
      const itemName = document.getElementById('rc-name').value.trim();
      const date = document.getElementById('rc-date').value;
      const qtyRaw = parseNum(document.getElementById('rc-qty').value);
      const isReturn = document.getElementById('rc-return').checked;
      const qty = isReturn ? -Math.abs(qtyRaw) : qtyRaw;
      const wh = document.getElementById('rc-wh').value.trim();
      const note = document.getElementById('rc-note').value.trim();
      const file = document.getElementById('rc-img').files[0];
      const isHist = document.getElementById('rc-historical-manual').checked;
      if(!vendor||!itemCode||!date||!qtyRaw){ resEl.innerHTML = `<div class="badge-error" style="position:static;">필수 항목(*)을 입력해 주세요.</div>`; return; }
      const dupes = findExactDuplicateReceipts(vendor, itemCode, date, qty);
      const receiptId = uid(); let imgKey=null, ok=false;
      if(file){ const dataUrl = await compressImage(file); imgKey='receipt_img:'+receiptId; ok = await saveImage(imgKey, dataUrl); }
      DB.receipts.push({id:receiptId, vendor, itemCode, itemName, receiptDate:date, qty, warehouse:wh, note, imageAttached:ok, imageKey: ok?imgKey:null, isHistorical:isHist, excludeFromAllocation:isHist, isReturn, createdAt:new Date().toISOString()});
      reallocateGroup(vendor, itemCode);
      await saveReceipts(); await saveItems();
      const overflow = !isHist ? computeGroupOverflow(vendor, itemCode) : 0;
      resEl.innerHTML = `<div class="section-note" style="border-color:var(--brand); background:var(--green-bg); color:var(--green);">등록 완료 및 자동 배분되었습니다.${isReturn?' · 반품(마이너스 입고)으로 처리됨':''}${isHist?' · 이력데이터로 등록됨':''}</div>
        ${dupes.length?`<div class="section-note warn" style="margin-top:8px;">⚠ 동일한 거래처/품번/입고일/수량 조합이 이미 ${dupes.length}건 있습니다. 중복 등록이 아닌지 확인해 주세요.</div>`:''}
        ${overflow>0?`<div class="section-note warn" style="margin-top:8px;">⚠ 이 품번의 입고수량 합계가 발주수량 합계보다 ${fmtNum(overflow)} 많습니다. 중복 입력이나 반품 누락 여부를 확인해 주세요.</div>`:''}`;
      toast('입고가 등록되었습니다.');
      setTimeout(()=>renderReceiveUpload(document.getElementById('content')), 500);
    };
    document.querySelectorAll('[data-view-r]').forEach(b=>{ b.onclick=()=>openReceiptImageModalRaw(b.getAttribute('data-view-r')); });
    document.querySelectorAll('[data-attach-r]').forEach(b=>{ b.onclick=()=>openAttachImageModal(b.getAttribute('data-attach-r')); });
    document.querySelectorAll('[data-edit-r]').forEach(b=>{ b.onclick=()=>openEditReceiptModalFull(b.getAttribute('data-edit-r')); });
    document.querySelectorAll('[data-del-r]').forEach(b=>{
      b.onclick = ()=> showConfirm('이 입고 내역을 삭제할까요?\n삭제 시 관련 발주건의 입고/미입고 수량이 재계산됩니다.', async ()=>{
        const r = DB.receipts.find(x=>x.id===b.getAttribute('data-del-r')); if(!r) return;
        if(r.imageKey) await deleteImage(r.imageKey);
        DB.receipts = DB.receipts.filter(x=>x.id!==r.id);
        reallocateGroup(r.vendor, r.itemCode);
        await saveReceipts(); await saveItems();
        toast('삭제되었습니다.'); renderReceiveUpload(document.getElementById('content'));
      });
    });
  }
  function openEditReceiptModalFull(receiptId){
    const r = DB.receipts.find(x=>x.id===receiptId); if(!r) return;
    const root = document.getElementById('modal-root');
    root.innerHTML = `<div class="modal-backdrop"><div class="modal">
      <div class="modal-head"><h3>입고 내역 수정</h3><button class="modal-close" id="m-close">✕</button></div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field"><label>외주거래처 <span class="req">*</span></label><input type="text" id="er-vendor" list="vendor-datalist2" value="${esc(r.vendor)}"/></div>
          <div class="field"><label>품번 <span class="req">*</span></label><input type="text" id="er-code" value="${esc(r.itemCode)}"/></div>
        </div>
        <div class="field-row">
          <div class="field"><label>품명</label><input type="text" id="er-name" value="${esc(r.itemName||'')}"/></div>
          <div class="field"><label>입고일 <span class="req">*</span></label><input type="date" id="er-date" value="${esc(r.receiptDate)}"/></div>
        </div>
        <div class="field-row">
          <div class="field"><label>입고수량 <span class="req">*</span></label><input type="number" id="er-qty" min="1" value="${Math.abs(r.qty)}"/><div class="hint">반품 체크 시에도 반품 수량을 양수로 입력하세요</div></div>
          <div class="field"><label>창고</label><input type="text" id="er-wh" value="${esc(r.warehouse||'')}"/></div>
        </div>
        <div class="field"><label>비고</label><input type="text" id="er-note" value="${esc(r.note||'')}"/></div>
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:8px; font-size:12.5px; cursor:pointer;"><input type="checkbox" id="er-return" ${(r.isReturn || Number(r.qty)<0)?'checked':''}/> 반품(마이너스 입고)</label>
        <label style="display:flex; align-items:center; gap:6px; margin-bottom:12px; font-size:12.5px; cursor:pointer;"><input type="checkbox" id="er-historical" ${r.isHistorical?'checked':''}/> 과거 이력 데이터 (체크 시 미납수량 계산에서 제외)</label>
        <div style="display:flex; gap:8px;">
          <button class="btn primary" id="er-save" style="flex:1;">수정 저장</button>
          <button class="btn danger" id="er-delete">삭제</button>
        </div>
      </div></div></div>`;
    document.getElementById('m-close').onclick = ()=>root.innerHTML='';
    document.getElementById('er-delete').onclick = ()=>{
      showConfirm('이 입고 내역을 삭제할까요?\n삭제 시 관련 발주건의 입고/미입고 수량이 재계산됩니다.', async ()=>{
        if(r.imageKey) await deleteImage(r.imageKey);
        DB.receipts = DB.receipts.filter(x=>x.id!==r.id);
        reallocateGroup(r.vendor, r.itemCode);
        await saveReceipts(); await saveItems();
        root.innerHTML=''; toast('삭제되었습니다.'); renderTab();
      });
    };
    document.getElementById('er-save').onclick = async ()=>{
      const vendor = document.getElementById('er-vendor').value.trim();
      const itemCode = document.getElementById('er-code').value.trim();
      const itemName = document.getElementById('er-name').value.trim();
      const date = document.getElementById('er-date').value;
      const qtyRaw = parseNum(document.getElementById('er-qty').value);
      const isReturn = document.getElementById('er-return').checked;
      const qty = isReturn ? -Math.abs(qtyRaw) : qtyRaw;
      const wh = document.getElementById('er-wh').value.trim();
      const note = document.getElementById('er-note').value.trim();
      const isHist = document.getElementById('er-historical').checked;
      if(!vendor || !itemCode || !date || !qtyRaw){ toast('필수 항목을 입력해 주세요.', true); return; }
      const oldVendor = r.vendor, oldItemCode = r.itemCode;
      r.vendor = vendor; r.itemCode = itemCode; r.itemName = itemName; r.receiptDate = date; r.qty = qty; r.warehouse = wh; r.note = note; r.isHistorical = isHist; r.excludeFromAllocation = isHist; r.isReturn = isReturn;
      await saveReceipts();
      if(oldVendor !== vendor || oldItemCode !== itemCode) reallocateGroup(oldVendor, oldItemCode);
      reallocateGroup(vendor, itemCode);
      await saveItems();
      root.innerHTML=''; toast('입고 내역이 수정되었습니다.'); renderTab();
    };
  }
  function openAttachImageModal(receiptId){
    const r = DB.receipts.find(x=>x.id===receiptId); if(!r) return;
    const root = document.getElementById('modal-root');
    root.innerHTML = `<div class="modal-backdrop"><div class="modal">
      <div class="modal-head"><h3>명세서 첨부 · ${esc(r.vendor)} / ${esc(r.itemCode)}</h3><button class="modal-close" id="m-close">✕</button></div>
      <div class="modal-body">
        <div class="field"><label>명세서 이미지 <span class="req">*</span></label><input type="file" id="a-img" accept="image/*"/></div>
        <button class="btn primary" id="a-save" style="width:100%;">첨부 저장</button>
      </div></div></div>`;
    document.getElementById('m-close').onclick=()=>root.innerHTML='';
    document.getElementById('a-save').onclick = async ()=>{
      const file = document.getElementById('a-img').files[0];
      if(!file){ toast('이미지를 선택해 주세요.', true); return; }
      const dataUrl = await compressImage(file);
      const imgKey = r.imageKey || ('receipt_img:'+uid());
      const ok = await saveImage(imgKey, dataUrl);
      if(ok){ r.imageKey=imgKey; r.imageAttached=true; await saveReceipts(); }
      root.innerHTML=''; toast('명세서가 첨부되었습니다.'); renderTab();
    };
  }
  async function openReceiptImageModalRaw(receiptId){
    const r = DB.receipts.find(x=>x.id===receiptId); if(!r || !r.imageKey) return;
    const root = document.getElementById('modal-root');
    root.innerHTML = `<div class="modal-backdrop"><div class="modal">
      <div class="modal-head"><h3>명세서 · ${esc(r.vendor)} / ${esc(r.itemCode)}</h3><button class="modal-close" id="m-close">✕</button></div>
      <div class="modal-body" id="img-body"><div class="empty-state">이미지를 불러오는 중...</div></div>
    </div></div>`;
    document.getElementById('m-close').onclick=()=>root.innerHTML='';
    const dataUrl = await getImage(r.imageKey);
    const body = document.getElementById('img-body');
    if(!dataUrl){ body.innerHTML='<div class="empty-state">이미지를 불러올 수 없습니다.</div>'; return; }
    body.innerHTML = `<img class="thumb" src="${dataUrl}"/>
      <div style="margin-top:10px; font-size:12px; color:var(--muted);">입고일 ${esc(r.receiptDate)} · 수량 ${fmtNum(r.qty)} · 창고 ${esc(r.warehouse)}${r.note?' · '+esc(r.note):''}</div>
      <a class="btn small" style="display:inline-block; margin-top:10px;" download="명세서_${esc(r.vendor)}_${esc(r.itemCode)}_${esc(r.receiptDate)}.jpg" href="${dataUrl}">다운로드</a>`;
  }

  // ================= ADMIN: 발주 전체 리스트 =================
  function renderOrdersAll(c){
    setTitle('발주 전체 리스트', '등록된 모든 외주거래처의 발주 데이터를 조회합니다');
    const list = applyFilters(DB.items);
